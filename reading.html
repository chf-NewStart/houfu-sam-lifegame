<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salle de lecture — moved</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/game/brand-favicon.png?v=3">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f4efe6; color: #2b2620; min-height: 100vh; padding: 60px 20px; line-height: 1.7; }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.4rem; font-style: italic; margin-bottom: 14px; }
    p { margin-bottom: 14px; font-size: 0.95rem; }
    a { color: #7a5c2e; }
    .btn { font-family: inherit; font-size: 0.85rem; color: #7a5c2e; background: transparent; border: 1px solid #7a5c2e; border-radius: 3px; padding: 7px 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>La salle de lecture a déménagé</h1>
  <p>The reading room now lives at <a href="https://houfu72.com/reading.html">houfu72.com/reading.html</a>.</p>
  <p id="dataMsg" class="hidden">You have texts and notes saved in this browser from the old address. Download them here, then use “restaurer une sauvegarde” at the new address to bring them along:</p>
  <p><button class="btn hidden" id="backupBtn">download my saved texts (.json)</button></p>
  <p><a href="https://houfu72.com/reading.html">→ Go to the reading room</a> · <a href="/">← arcade</a></p>
</div>
<script>
(function(){
  try {
    var s = JSON.parse(localStorage.getItem('readingRoom.v1'));
    if (s && s.chapters && s.chapters.length) {
      document.getElementById('dataMsg').classList.remove('hidden');
      var btn = document.getElementById('backupBtn');
      btn.classList.remove('hidden');
      btn.onclick = function(){
        var blob = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'salle-de-lecture-backup.json';
        a.click();
        URL.revokeObjectURL(a.href);
      };
    }
  } catch (e) {}
})();
</script>
</body>
</html>
