<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lesson 5: Zone Tool — Life Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Header ─────────────────────────────────── */
    .lesson-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid #141414;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-link { font-size: 0.7rem; color: #1db954; }
    .back-link:hover { text-decoration: underline; }
    .lesson-id { font-size: 0.62rem; color: #2a2a2a; letter-spacing: 1px; }
    .lesson-title-h { font-size: 0.85rem; color: #888; }

    .progress-dots { display: flex; gap: 5px; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #1a1a1a;
      transition: background 0.2s;
      cursor: pointer;
    }
    .dot.active { background: #1db954; }
    .dot.done   { background: #1a3a22; }

    /* ── Main layout ─────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left: explanation panel ─────────────────── */
    .panel {
      width: 320px;
      flex-shrink: 0;
      border-right: 1px solid #141414;
      display: flex;
      flex-direction: column;
      padding: 32px 28px;
      overflow-y: auto;
    }

    .stage-num { font-size: 0.58rem; color: #2a2a2a; letter-spacing: 2px; margin-bottom: 10px; }
    .stage-title { font-size: 1.1rem; color: #eee; margin-bottom: 16px; font-weight: normal; }
    .stage-text {
      font-size: 0.74rem;
      color: #666;
      line-height: 1.85;
      flex: 1;
    }
    .stage-text b { color: #aaa; font-weight: normal; }
    .stage-text .hi-green { color: #1db954; }

    .rule-box {
      background: #0d0d0d;
      border-left: 3px solid #1db954;
      padding: 11px 14px;
      margin: 18px 0 4px;
      font-size: 0.78rem;
      line-height: 2;
      color: #999;
    }
    .rule-box b { color: #eee; font-weight: normal; }
    .rule-box.casual { border-left-color: #2a2a2a; color: #555; line-height: 2.3; font-size: 0.76rem; }
    .rule-box.casual b { color: #888; }

    .example-btn {
      margin-top: 22px;
      padding: 8px 14px;
      background: none;
      border: 1px solid #1a3a22;
      color: #1db954;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .example-btn:hover { background: rgba(29,185,84,0.06); border-color: #1db954; }

    .stage-nav {
      display: flex;
      gap: 8px;
      margin-top: 28px;
    }
    .nav-btn {
      flex: 1;
      padding: 9px 0;
      background: none;
      border: 1px solid #1e1e1e;
      color: #555;
      font-family: inherit;
      font-size: 0.72rem;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:hover { border-color: #333; color: #888; }
    .nav-btn.primary { border-color: #1a3a22; color: #1db954; }
    .nav-btn.primary:hover { background: rgba(29,185,84,0.06); border-color: #1db954; }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    /* ── Right: canvas area ──────────────────────── */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      gap: 16px;
    }

    canvas {
      display: block;
      border: 1px solid #141414;
    }

    .controls {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ctrl-btn {
      padding: 6px 14px;
      background: none;
      border: 1px solid #1e1e1e;
      color: #555;
      font-family: inherit;
      font-size: 0.68rem;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .ctrl-btn:hover { border-color: #333; color: #888; }
    .ctrl-btn.active { border-color: #1db954; color: #1db954; }

    .status-bar {
      font-size: 0.68rem;
      color: #333;
      min-height: 1.4em;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .gen-display {
      font-size: 0.62rem;
      color: #2a2a2a;
      letter-spacing: 1px;
    }

    /* ── Footer nav ──────────────────────────────── */
    .lesson-footer {
      border-top: 1px solid #141414;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .foot-btn {
      padding: 7px 16px;
      background: none;
      border: 1px solid #1e1e1e;
      color: #333;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      text-decoration: none;
      display: inline-block;
    }
    .foot-btn:hover { border-color: #333; color: #666; }
    .foot-btn.hi { border-color: #1a3a22; color: #1db954; }
    .foot-btn.hi:hover { background: rgba(29,185,84,0.06); border-color: #1db954; }

    /* ── Mobile ──────────────────────────────────── */
    @media (max-width: 720px) {
      .main { flex-direction: column-reverse; overflow: visible; }
      .panel { width: 100%; border-right: none; border-top: 1px solid #141414; padding: 24px 18px; }
      .canvas-area { padding: 16px 28px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="lesson-header">
  <div class="header-left">
    <a class="back-link" href="/training">← Training</a>
    <span class="lesson-id">LESSON 05</span>
    <span class="lesson-title-h">Zone Tool</span>
  </div>
  <div class="progress-dots" id="progressDots"></div>
</header>

<!-- Main -->
<div class="main">

  <!-- Left: explanation -->
  <aside class="panel">
    <div class="stage-num" id="stageNum">STAGE 1 / 4</div>
    <h2 class="stage-title" id="stageTitle"></h2>
    <div class="rule-box" id="ruleBox" style="display:none"></div>
    <div class="stage-text" id="stageText"></div>
    <button class="example-btn" id="exampleBtn" style="display:none"></button>
    <div class="stage-nav">
      <button class="nav-btn" id="backBtn" onclick="prevStage()">← Back</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextStage()">Continue →</button>
    </div>
  </aside>

  <!-- Right: canvas + controls -->
  <section class="canvas-area">
    <canvas id="canvas"></canvas>

    <div class="controls">
      <button class="ctrl-btn" onclick="clearZone()">✕ Clear Zone</button>
      <button class="ctrl-btn" onclick="stepGrid()">⊙ Step</button>
      <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    </div>

    <div class="status-bar" id="statusBar">drag on canvas to draw a zone</div>
    <div class="gen-display">gen <span id="genNum">0</span></div>
  </section>

</div>

<!-- Footer -->
<footer class="lesson-footer">
  <a class="foot-btn" href="/training/lesson4">← Lesson 4</a>
  <a class="foot-btn hi" href="/training/lesson6">Lesson 6: Bridge →</a>
</footer>

<script>
/* ── Grid setup ──────────────────────────────────── */
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const COLS    = 18;
const ROWS    = 13;

function computeCell() {
  const maxW = Math.min(window.innerWidth <= 720 ? window.innerWidth - 56 : 560, 560);
  return Math.max(22, Math.floor(maxW / COLS));
}
let CELL = computeCell();
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

let grid       = new Uint8Array(COLS * ROWS);
let generation = 0;
let running    = false;
let rafId      = null;
let lastStep   = 0;
const INTERVAL = 180;

function idx(c, r) { return r * COLS + c; }

function countNeighbors(c, r) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nc = c + dc, nr = r + dr;
      if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS) n += grid[idx(nc, nr)];
    }
  return n;
}

/* ── Zone state ──────────────────────────────────── */
// selRect: { c0, r0, c1, r1 } or null
let selRect    = null;
let zoneActive = false;   // true once drawn
let drawingZone = false;
let zoneStart  = null;

function clearZone() {
  selRect    = null;
  zoneActive = false;
  updateStatus();
  draw();
}

function cellsInZone() {
  if (!selRect) return 0;
  const { c0, r0, c1, r1 } = normaliseRect(selRect);
  let n = 0;
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++)
      n += grid[idx(c, r)];
  return n;
}

function normaliseRect(rect) {
  return {
    c0: Math.min(rect.c0, rect.c1),
    r0: Math.min(rect.r0, rect.r1),
    c1: Math.max(rect.c0, rect.c1),
    r1: Math.max(rect.r0, rect.r1),
  };
}

/* ── Status ──────────────────────────────────────── */
function updateStatus() {
  const bar = document.getElementById('statusBar');
  if (!selRect) {
    bar.textContent = 'drag on canvas to draw a zone';
    return;
  }
  const nr = normaliseRect(selRect);
  const w  = nr.c1 - nr.c0 + 1;
  const h  = nr.r1 - nr.r0 + 1;
  const n  = cellsInZone();
  bar.textContent = `zone ${w}×${h} · ${n} live cell${n !== 1 ? 's' : ''} inside`;
}

/* ── Drawing ─────────────────────────────────────── */
function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#181818';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, ROWS * CELL); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke();
  }

  // Dimmed overlay outside zone
  if (selRect) {
    const nr = normaliseRect(selRect);
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (c < nr.c0 || c > nr.c1 || r < nr.r0 || r > nr.r1) {
          ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
        }
      }
    }
  }

  // Cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const alive = grid[idx(c, r)];
      const n     = countNeighbors(c, r);
      const willLive = alive ? (n === 2 || n === 3) : (n === 3);
      const cx = c * CELL, cy = r * CELL;
      if (alive) {
        ctx.fillStyle = willLive ? '#1db954' : '#c0392b';
        ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      } else if (n === 3) {
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      }
    }
  }

  // Zone border (dashed) + count badge
  if (selRect) {
    const nr = normaliseRect(selRect);
    const x  = nr.c0 * CELL;
    const y  = nr.r0 * CELL;
    const w  = (nr.c1 - nr.c0 + 1) * CELL;
    const h  = (nr.r1 - nr.r0 + 1) * CELL;

    ctx.strokeStyle = 'rgba(29,185,84,0.7)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
    ctx.setLineDash([]);

    // Count badge
    const n = cellsInZone();
    const label = `${n}`;
    const badgeFontSize = Math.max(10, Math.floor(CELL * 0.38));
    ctx.font = `${badgeFontSize}px 'Courier New', monospace`;
    const tw = ctx.measureText(label).width;
    const bx = x + w - tw - 8;
    const by = y + 3;
    const bw = tw + 8;
    const bh = badgeFontSize + 5;
    ctx.fillStyle = 'rgba(29,185,84,0.15)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#1db954';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(label, bx + 4, by + 2);
  }

  document.getElementById('genNum').textContent = generation;
  updateStatus();
}

/* ── Simulation ──────────────────────────────────── */
function stepGrid() {
  const next = new Uint8Array(COLS * ROWS);
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const n = countNeighbors(c, r);
      const alive = grid[idx(c, r)];
      next[idx(c, r)] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
    }
  grid = next;
  generation++;
  draw();
}

function loop(ts) {
  if (!running) return;
  if (ts - lastStep >= INTERVAL) { stepGrid(); lastStep = ts; }
  rafId = requestAnimationFrame(loop);
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('playBtn');
  btn.textContent = running ? '⏸ Pause' : '▶ Play';
  btn.classList.toggle('active', running);
  if (running) rafId = requestAnimationFrame(loop);
  else if (rafId) cancelAnimationFrame(rafId);
}

/* ── Patterns ────────────────────────────────────── */
function loadPattern(name) {
  if (running) togglePlay();
  const patterns = {
    glider:  [[-1,1],[0,-1],[0,1],[1,0],[1,1]],
    blinker: [[0,-1],[0,0],[0,1]],
    block:   [[-1,-1],[0,-1],[-1,0],[0,0]],
  };
  const cells = patterns[name];
  if (!cells) return;
  grid.fill(0);
  generation = 0;
  const offC = Math.floor(COLS / 2), offR = Math.floor(ROWS / 2);
  cells.forEach(([dc, dr]) => {
    const c = offC + dc, r = offR + dr;
    if (c >= 0 && c < COLS && r >= 0 && r < ROWS) grid[idx(c, r)] = 1;
  });
  draw();
}

/* ── Canvas interaction ──────────────────────────── */
// Zone drawing takes priority; if not drawing a zone, do cell paint
let painting = false, paintVal = 1;
let zoneMode = true;   // first interaction draws a zone; subsequent clicks paint

function cellAt(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = ((e.clientX !== undefined ? e.clientX : e.touches[0].clientX) - rect.left) * scaleX;
  const y = ((e.clientY !== undefined ? e.clientY : e.touches[0].clientY) - rect.top)  * scaleY;
  const c = Math.max(0, Math.min(COLS - 1, Math.floor(x / CELL)));
  const r = Math.max(0, Math.min(ROWS - 1, Math.floor(y / CELL)));
  return { c, r };
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const { c, r } = cellAt(e);
  // Right-click or zone mode: start zone draw
  drawingZone = true;
  zoneStart = { c, r };
  selRect = { c0: c, r0: r, c1: c, r1: r };
  draw();
});

canvas.addEventListener('mousemove', e => {
  if (!drawingZone) return;
  const { c, r } = cellAt(e);
  selRect = { c0: zoneStart.c, r0: zoneStart.r, c1: c, r1: r };
  draw();
});

canvas.addEventListener('mouseup', () => {
  if (drawingZone) {
    drawingZone = false;
    zoneActive = true;
    draw();
  }
});

canvas.addEventListener('mouseleave', () => {
  if (drawingZone) { drawingZone = false; zoneActive = true; draw(); }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const { c, r } = cellAt(e);
  drawingZone = true;
  zoneStart = { c, r };
  selRect = { c0: c, r0: r, c1: c, r1: r };
  draw();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawingZone) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const x = (t.clientX - rect.left) * (canvas.width  / rect.width);
  const y = (t.clientY - rect.top)  * (canvas.height / rect.height);
  const c = Math.max(0, Math.min(COLS - 1, Math.floor(x / CELL)));
  const r = Math.max(0, Math.min(ROWS - 1, Math.floor(y / CELL)));
  selRect = { c0: zoneStart.c, r0: zoneStart.r, c1: c, r1: r };
  draw();
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (drawingZone) { drawingZone = false; zoneActive = true; draw(); }
});

/* ── Stage definitions ──────────────────────────── */
function _setup(fn) {
  return () => {
    if (running) togglePlay();
    grid.fill(0);
    generation = 0;
    selRect = null;
    zoneActive = false;
    fn();
    draw();
  };
}

const STAGES = [
  {
    title: 'Zones',
    text: `A zone lets you focus on a specific area of the grid.<br><br>Click and drag on the canvas to draw a rectangular zone. The area outside dims slightly, and a <span class="hi-green">green count badge</span> shows how many live cells are inside.<br><br>A Glider is loaded — draw a zone around it and watch the count.`,
    setup: _setup(() => loadPattern('glider')),
    resetLabel: '↺ Reload Glider',
  },
  {
    title: 'Counting',
    text: `A 3×3 block is loaded. Draw a zone around it — the badge shows <b>9</b>.<br><br>Now draw the zone to only include part of the block. The count updates in real time as you resize.<br><br>Cells outside the zone are still alive and evolving — the zone just focuses your measurement.`,
    setup: _setup(() => loadPattern('block')),
    resetLabel: '↺ Reload Block',
  },
  {
    title: 'Watching Evolution',
    text: `A Blinker is loaded. Draw a zone around it.<br><br>Hit <b>Play</b> and watch the count badge pulse between values — the Blinker alternates between 2 and 3 cells depending on its orientation inside the zone.<br><br>In the main game, zones track live cells continuously during playback.`,
    setup: _setup(() => {
      loadPattern('blinker');
      // Pre-set a zone around center
      const cc = Math.floor(COLS / 2), cr = Math.floor(ROWS / 2);
      selRect = { c0: cc - 2, r0: cr - 3, c1: cc + 2, r1: cr + 3 };
      zoneActive = true;
    }),
    resetLabel: '↺ Reload Blinker',
  },
  {
    title: 'Try It',
    text: `You know how to draw and use zones. In the main game the zone tool is used in several challenges — including one that requires getting 5 cells into zone B.<br><br>Head to <b>Lesson 6</b> to try the Bridge challenge.`,
    setup: _setup(() => {}),
    resetLabel: '✕ Clear Zone',
    final: true,
  },
];

/* ── Stage system ────────────────────────────────── */
let currentStage = 0;

function buildDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  STAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentStage ? ' done' : i === currentStage ? ' active' : '');
    d.title = STAGES[i].title;
    d.onclick = () => goToStage(i);
    container.appendChild(d);
  });
}

function renderStage() {
  const s = STAGES[currentStage];
  document.getElementById('stageNum').textContent   = `STAGE ${currentStage + 1} / ${STAGES.length}`;
  document.getElementById('stageTitle').textContent = s.title;
  document.getElementById('stageText').innerHTML    = s.text;
  const rb = document.getElementById('ruleBox');
  if (s.rule) {
    rb.style.display = '';
    rb.innerHTML = s.rule;
    rb.className = 'rule-box' + (s.ruleClass ? ' ' + s.ruleClass : '');
  } else { rb.style.display = 'none'; }

  const exBtn = document.getElementById('exampleBtn');
  if (s.resetLabel) {
    exBtn.style.display = '';
    exBtn.textContent   = s.resetLabel;
    exBtn.onclick       = () => {
      if (s.resetLabel === '✕ Clear Zone') clearZone();
      else s.setup && s.setup();
    };
  } else {
    exBtn.style.display = 'none';
  }

  document.getElementById('backBtn').disabled = currentStage === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (currentStage === STAGES.length - 1) {
    nextBtn.textContent = 'Finish ✓';
    nextBtn.onclick     = () => { markVisited(); window.location.href = '/training'; };
  } else {
    nextBtn.textContent = 'Continue →';
    nextBtn.onclick     = nextStage;
  }

  if (s.setup) s.setup();
  buildDots();
}

function goToStage(i) { currentStage = i; renderStage(); }
function nextStage()   { if (currentStage < STAGES.length - 1) { currentStage++; renderStage(); } }
function prevStage()   { if (currentStage > 0) { currentStage--; renderStage(); } }

/* ── Visited tracking ───────────────────────────── */
function markVisited() {
  try {
    const key  = 'lifegame_training_visited';
    const set  = new Set(JSON.parse(localStorage.getItem(key) || '[]'));
    set.add(5);
    localStorage.setItem(key, JSON.stringify([...set]));
  } catch {}
}
markVisited();

/* ── Resize ─────────────────────────────────────── */
window.addEventListener('resize', () => {
  CELL = computeCell();
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  draw();
});

/* ── Init ────────────────────────────────────────── */
renderStage();
</script>
</body>
</html>
