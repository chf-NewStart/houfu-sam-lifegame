<script>
/* ── i18n (shared with the main app via localStorage) ── */
const LANG_KEY = 'lifegame_lang';
let lang = (function () { try { return localStorage.getItem(LANG_KEY) || 'en'; } catch { return 'en'; } })();

/* ── Grid ────────────────────────────────────────── */
const COLS = 28, ROWS = 18;
const BASE_CELL = 22;

let grid       = new Uint8Array(COLS * ROWS);
let generation = 0;
let running    = false;
let rafId      = null;
let lastStep   = 0;
const INTERVAL = 160;

function idx(c, r) { return r * COLS + c; }

function countNeighbors(c, r) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nc = c + dc, nr = r + dr;
      if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS) n += grid[idx(nc, nr)];
    }
  return n;
}

/* ── Viewport ────────────────────────────────────── */
const canvasWrap = document.getElementById('canvasWrap');
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');

let zoom = 1, panX = 0, panY = 0;
const ZOOM_MIN = 0.4, ZOOM_MAX = 4;

function computeWrapSize() {
  const area = canvasWrap.parentElement;
  const areaW = area.clientWidth - 48;
  const areaH = area.clientHeight - 90;
  const w = Math.min(areaW, COLS * BASE_CELL);
  const h = Math.min(areaH, ROWS * BASE_CELL);
  return { w: Math.max(200, w), h: Math.max(140, h) };
}

function sizeWrap() {
  const { w, h } = computeWrapSize();
  canvasWrap.style.width  = w + 'px';
  canvasWrap.style.height = h + 'px';
  canvas.width  = COLS * BASE_CELL;
  canvas.height = ROWS * BASE_CELL;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
  canvas.style.transformOrigin = '0 0';
  applyTransform();
}

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  document.getElementById('zoomNum').textContent = zoom.toFixed(1) + '×';
}

function clampPan() {
  const { w: ww, h: wh } = computeWrapSize();
  const scaledW = canvas.width  * zoom;
  const scaledH = canvas.height * zoom;
  panX = Math.min(0, Math.max(ww - scaledW, panX));
  panY = Math.min(0, Math.max(wh - scaledH, panY));
}

function resetView() {
  zoom = 1; panX = 0; panY = 0;
  applyTransform();
}

/* ── Zoom (wheel) ────────────────────────────────── */
canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect  = canvasWrap.getBoundingClientRect();
  const mx    = e.clientX - rect.left;
  const my    = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.12 : 0.89;
  const newZ  = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom * delta));
  // zoom toward mouse
  panX = mx - (mx - panX) * (newZ / zoom);
  panY = my - (my - panY) * (newZ / zoom);
  zoom = newZ;
  clampPan();
  applyTransform();
}, { passive: false });

/* ── Pan (drag on empty cells) ───────────────────── */
let panning = false, panStart = null;

canvasWrap.addEventListener('mousedown', e => {
  // check if clicking on an empty cell
  const { c, r } = cellAtWrap(e);
  if (c >= 0 && c < COLS && r >= 0 && r < ROWS && grid[idx(c, r)] === 0) {
    panning   = true;
    panStart  = { x: e.clientX - panX, y: e.clientY - panY };
    canvasWrap.style.cursor = 'grab';
  }
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  panX = e.clientX - panStart.x;
  panY = e.clientY - panStart.y;
  clampPan();
  applyTransform();
});
window.addEventListener('mouseup', () => {
  panning = false;
  canvasWrap.style.cursor = 'crosshair';
});

/* ── Pinch zoom (touch) ──────────────────────────── */
let lastPinchDist = null;
canvasWrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvasWrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastPinchDist) {
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const delta = dist / lastPinchDist;
    zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom * delta));
    lastPinchDist = dist;
    clampPan();
    applyTransform();
  }
}, { passive: false });
canvasWrap.addEventListener('touchend', () => { lastPinchDist = null; });

/* ── Cell drawing ────────────────────────────────── */
function cellAtWrap(e) {
  const rect = canvasWrap.getBoundingClientRect();
  const x = ((e.clientX - rect.left) - panX) / zoom;
  const y = ((e.clientY - rect.top)  - panY) / zoom;
  return { c: Math.floor(x / BASE_CELL), r: Math.floor(y / BASE_CELL) };
}

let painting = false, paintVal = 1;
canvasWrap.addEventListener('mousedown', e => {
  if (panning) return;
  const { c, r } = cellAtWrap(e);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
  paintVal = grid[idx(c, r)] ? 0 : 1;
  painting = true;
  grid[idx(c, r)] = paintVal;
  draw();
});
window.addEventListener('mousemove', e => {
  if (!painting || panning) return;
  const { c, r } = cellAtWrap(e);
  if (c >= 0 && c < COLS && r >= 0 && r < ROWS) { grid[idx(c, r)] = paintVal; draw(); }
});
window.addEventListener('mouseup', () => { painting = false; });

/* ── Draw ────────────────────────────────────────── */
function draw() {
  const CELL = BASE_CELL;
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#181818';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, ROWS * CELL); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke();
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const alive = grid[idx(c, r)];
      const n     = countNeighbors(c, r);
      const willLive = alive ? (n === 2 || n === 3) : (n === 3);
      const cx = c * CELL, cy = r * CELL;
      if (alive) {
        ctx.fillStyle = willLive ? '#1db954' : '#c0392b';
        ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      } else if (n === 3) {
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      }
    }
  }

  // Stage guidance — animated enclosures, shown at gen 0 only (before stepping)
  if (generation === 0) {
    const stage = STAGES[currentStage];
    if (stage && stage.highlights) drawGuides(stage.highlights);
  }

  document.getElementById('genNum').textContent = generation;
}

/* ── Guidance overlay (marching-ants + pulse) ────── */
function drawGuides(highlights) {
  const CELL    = BASE_CELL;
  const now     = performance.now();
  const dashLen = Math.max(5, Math.floor(CELL * 0.25));
  const offset  = -(now / 28) % (dashLen * 2);   // marching ants
  const pulse   = 0.5 + 0.5 * Math.sin(now / 480); // 0..1 breathing

  highlights.forEach(({ c0, r0, c1, r1, color = '#ffb400', pulse: doPulse = false, label: labelEn, labelZh }) => {
    const label = lang === 'zh' && labelZh ? labelZh : labelEn;
    const x = c0 * CELL;
    const y = r0 * CELL;
    const w = (c1 - c0 + 1) * CELL;
    const h = (r1 - r0 + 1) * CELL;

    // Pulsing glow fill
    if (doPulse) {
      ctx.globalAlpha = 0.06 + 0.10 * pulse;
      ctx.fillStyle = color;
      ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
      ctx.globalAlpha = 1;
    }

    // Animated dashed enclosure
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.setLineDash([dashLen, dashLen]);
    ctx.lineDashOffset = offset;
    ctx.strokeRect(x + 1.5, y + 1.5, w - 3, h - 3);
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;

    // Secondary text label — legible chip with background behind text
    if (label) {
      const fontPx = Math.max(13, Math.floor(CELL * 0.42));
      ctx.save();
      ctx.font = `bold ${fontPx}px 'Courier New', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const padX = 8, padY = 5, radius = 4;
      const tw = ctx.measureText(label).width;
      const chipW = tw + padX * 2;
      const chipH = fontPx + padY * 2;
      const chipCX = x + w / 2;
      const chipBottom = y - 4;            // sit just above the box
      const chipX = chipCX - chipW / 2;
      const chipY = chipBottom - chipH;

      // Rounded-rect chip background
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(chipX, chipY, chipW, chipH, radius);
      } else {
        const rr = Math.min(radius, chipW / 2, chipH / 2);
        ctx.moveTo(chipX + rr, chipY);
        ctx.lineTo(chipX + chipW - rr, chipY);
        ctx.arcTo(chipX + chipW, chipY, chipX + chipW, chipY + rr, rr);
        ctx.lineTo(chipX + chipW, chipY + chipH - rr);
        ctx.arcTo(chipX + chipW, chipY + chipH, chipX + chipW - rr, chipY + chipH, rr);
        ctx.lineTo(chipX + rr, chipY + chipH);
        ctx.arcTo(chipX, chipY + chipH, chipX, chipY + chipH - rr, rr);
        ctx.lineTo(chipX, chipY + rr);
        ctx.arcTo(chipX, chipY, chipX + rr, chipY, rr);
        ctx.closePath();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(8,8,8,0.85)';
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = color;
      ctx.stroke();

      // Bright label text on top
      const LABEL_TINT = { '#ffb400': '#ffe08a', '#1db954': '#7dffa8', '#e05252': '#ff9d9d', '#c0392b': '#ff9d9d' };
      const tint = LABEL_TINT[color] || '#ffffff';
      ctx.fillStyle = tint;
      ctx.fillText(label, chipCX, chipY + chipH / 2 + 0.5);
      ctx.restore();
    }
  });
}

/* ── Always-on guidance animation (never steps) ──── */
function guideTick() {
  if (!running && generation === 0) {
    const stage = STAGES[currentStage];
    if (stage && stage.highlights) draw();
  }
  requestAnimationFrame(guideTick);
}
requestAnimationFrame(guideTick);

/* ── Simulation ──────────────────────────────────── */
function stepGrid() {
  const next = new Uint8Array(COLS * ROWS);
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const n = countNeighbors(c, r);
      const alive = grid[idx(c, r)];
      next[idx(c, r)] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
    }
  grid = next;
  generation++;
  draw();
}

function loop(ts) {
  if (!running) return;
  if (ts - lastStep >= INTERVAL) { stepGrid(); lastStep = ts; }
  rafId = requestAnimationFrame(loop);
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('playBtn');
  btn.textContent = running
    ? (lang === 'zh' ? '⏸ 暂停' : '⏸ Pause')
    : (lang === 'zh' ? '▶ 播放' : '▶ Play');
  btn.classList.toggle('active', running);
  if (running) rafId = requestAnimationFrame(loop);
  else if (rafId) cancelAnimationFrame(rafId);
}

/* ── Patterns ────────────────────────────────────── */
function loadGlider(offC, offR) {
  [[-1,1],[0,-1],[0,1],[1,0],[1,1]].forEach(([dc, dr]) => {
    const c = offC + dc, r = offR + dr;
    if (c >= 0 && c < COLS && r >= 0 && r < ROWS) grid[idx(c, r)] = 1;
  });
}

function loadLwss(offC, offR) {
  [[-2,0],[-1,-1],[2,-1],[-2,1],[2,1],[-1,2],[0,2],[1,2]].forEach(([dc, dr]) => {
    const c = offC + dc, r = offR + dr;
    if (c >= 0 && c < COLS && r >= 0 && r < ROWS) grid[idx(c, r)] = 1;
  });
}

/* ── Stage definitions ──────────────────────────── */
function _setup(fn) {
  return () => { if (running) togglePlay(); grid.fill(0); generation = 0; fn(); draw(); };
}

const STAGES = [
  {
    title: 'Zoom',
    titleZh: '缩放',
    text: `Scroll your mouse wheel (or pinch on mobile) to zoom in and out. The pattern stays in place — only your view changes.<br><br>A Glider is loaded in the center. Zoom in to see individual cells clearly. Zoom out to see the full grid at once.`,

/* ── Stage system ────────────────────────────────── */
let currentStage = 0;

function buildDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  STAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentStage ? ' done' : i === currentStage ? ' active' : '');
    d.title = lang === 'zh' && STAGES[i].titleZh ? STAGES[i].titleZh : STAGES[i].title;
    d.onclick = () => goToStage(i);
    container.appendChild(d);
  });
}

function renderStage() {
  const s = STAGES[currentStage];
  document.getElementById('stageNum').textContent   = lang === 'zh'
    ? `阶段 ${currentStage + 1} / ${STAGES.length}`
    : `STAGE ${currentStage + 1} / ${STAGES.length}`;
  document.getElementById('stageTitle').textContent = lang === 'zh' && s.titleZh ? s.titleZh : s.title;
  document.getElementById('stageText').innerHTML    = lang === 'zh' && s.textZh ? s.textZh : s.text;
  const rb = document.getElementById('ruleBox');
  if (s.rule) {
    rb.style.display = '';
    rb.innerHTML = s.rule;
    rb.className = 'rule-box' + (s.ruleClass ? ' ' + s.ruleClass : '');
  } else { rb.style.display = 'none'; }

  const exBtn = document.getElementById('exampleBtn');
  if (s.resetLabel) {
    exBtn.style.display = '';
    exBtn.textContent   = lang === 'zh' && s.resetLabelZh ? s.resetLabelZh : s.resetLabel;
    exBtn.onclick       = s.resetLabel === '⊙ Reset View' ? resetView : () => s.setup && s.setup();
  } else {
    exBtn.style.display = 'none';
  }

  document.getElementById('backBtn').disabled = currentStage === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (currentStage === STAGES.length - 1) {
    nextBtn.textContent = lang === 'zh' ? '完成 ✓' : 'Finish ✓';
    nextBtn.onclick     = () => { markVisited(); window.location.href = '/training'; };
  } else {
    nextBtn.textContent = lang === 'zh' ? '继续 →' : 'Continue →';
    nextBtn.onclick     = nextStage;
  }

  if (s.setup) s.setup();
  buildDots();
}

function goToStage(i) { currentStage = i; renderStage(); }
function nextStage()   { if (currentStage < STAGES.length - 1) { currentStage++; renderStage(); } }
function prevStage()   { if (currentStage > 0) { currentStage--; renderStage(); } }

/* ── Visited tracking ───────────────────────────── */
function markVisited() {
  try {
    const key  = 'lifegame_training_visited';
    const set  = new Set(JSON.parse(localStorage.getItem(key) || '[]'));
    set.add(4);
    localStorage.setItem(key, JSON.stringify([...set]));
  } catch {}
}
markVisited();

/* ── Resize ─────────────────────────────────────── */
window.addEventListener('resize', () => {
  sizeWrap();
  draw();
});

/* ── i18n apply / toggle ─────────────────────────── */
function applyLang() {
  document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.querySelectorAll('[data-en]').forEach(el => {
    el.innerHTML = lang === 'zh' ? el.dataset.zh : el.dataset.en;
  });
  renderStage();
}
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  try { localStorage.setItem(LANG_KEY, lang); } catch {}
  applyLang();
}

/* ── Init ────────────────────────────────────────── */
sizeWrap();
applyLang();
</script>
