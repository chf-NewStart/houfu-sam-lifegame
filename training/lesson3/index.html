<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lesson 3: Patterns — Life Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Header ─────────────────────────────────── */
    .lesson-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid #141414;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-link { font-size: 0.7rem; color: #1db954; }
    .back-link:hover { text-decoration: underline; }
    .lesson-id { font-size: 0.62rem; color: #2a2a2a; letter-spacing: 1px; }
    .lesson-title-h { font-size: 0.85rem; color: #888; }

    .progress-dots { display: flex; gap: 5px; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #1a1a1a;
      transition: background 0.2s;
      cursor: pointer;
    }
    .dot.active { background: #1db954; }
    .dot.done   { background: #1a3a22; }

    /* ── Main layout ─────────────────────────────── */

      display: flex;

    }

    /* ── Left: explanation panel ─────────────────── */

      width: 320px;

    .stage-num { font-size: 0.58rem; color: #2a2a2a; letter-spacing: 2px; margin-bottom: 10px; }
    .stage-title { font-size: 1.1rem; color: #eee; margin-bottom: 16px; font-weight: normal; }
    .stage-text {
      font-size: 0.74rem;
      color: #666;

      line-height: 2;
      color: #999;
    }
    .rule-box b { color: #eee; font-weight: normal; }
    .rule-box.casual { border-left-color: #2a2a2a; color: #555; line-height: 2.3; font-size: 0.76rem; }
    .rule-box.casual b { color: #888; }

    .example-btn {
      margin-top: 22px;
      padding: 8px 14px;
      background: none;
      border: 1px solid #1a3a22;
      color: #1db954;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .example-btn:hover { background: rgba(29,185,84,0.06); border-color: #1db954; }

    .stage-nav {
      display: flex;
      gap: 8px;
      margin-top: 28px;
    }
    .nav-btn {
      flex: 1;
      padding: 9px 0;
      background: none;
      border: 1px solid #1e1e1e;
      color: #555;
      font-family: inherit;
      font-size: 0.72rem;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:hover { border-color: #333; color: #888; }
    .nav-btn.primary { border-color: #1a3a22; color: #1db954; }
    .nav-btn.primary:hover { background: rgba(29,185,84,0.06); border-color: #1db954; }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    /* ── Right: canvas area ──────────────────────── */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      gap: 14px;
    }

    /* Pattern row above canvas */
    .pattern-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pbtn {
      padding: 5px 12px;
      background: none;
      border: 1px solid #1e1e1e;
      color: #444;
      font-family: inherit;
      font-size: 0.65rem;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .pbtn:hover { border-color: #333; color: #888; }

    canvas {
      display: block;
      cursor: crosshair;
      border: 1px solid #141414;
    }

    .controls {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ctrl-btn {
      padding: 6px 14px;
      background: none;
      border: 1px solid #1e1e1e;
      color: #555;
      font-family: inherit;
      font-size: 0.68rem;
      cursor: pointer;
      border-radius: 3px;

    }
    .ctrl-btn:hover { border-color: #333; color: #888; }
    .ctrl-btn.active { border-color: #1db954; color: #1db954; }

    .gen-display {
      font-size: 0.62rem;
      color: #2a2a2a;
      letter-spacing: 1px;
    }

    /* ── Footer nav ──────────────────────────────── */
    .lesson-footer {
      border-top: 1px solid #141414;

    .foot-btn.hi { border-color: #1a3a22; color: #1db954; }

    /* ── Mobile ──────────────────────────────────── */
    @media (max-width: 720px) {
      .main { flex-direction: column-reverse; overflow: visible; }
      .panel { width: 100%; border-right: none; border-top: 1px solid #141414; padding: 24px 18px; }
      .canvas-area { padding: 16px 28px; }
    }
  </style>

<body>

<!-- Header -->
<header class="lesson-header">
  <div class="header-left">
    <a class="back-link" href="/training">← Training</a>
    <span class="lesson-id">LESSON 03</span>
    <span class="lesson-title-h">Patterns</span>
  </div>
  <div class="progress-dots" id="progressDots"></div>
</header>

<!-- Main -->
<div class="main">

  <!-- Left: explanation -->
  <aside class="panel">
    <div class="stage-num" id="stageNum">STAGE 1 / 5</div>
    <h2 class="stage-title" id="stageTitle"></h2>
    <div class="rule-box" id="ruleBox" style="display:none"></div>
    <div class="stage-text" id="stageText"></div>
    <button class="example-btn" id="exampleBtn" style="display:none"></button>
    <div class="stage-nav">
      <button class="nav-btn" id="backBtn" onclick="prevStage()">← Back</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextStage()">Continue →</button>
    </div>
  </aside>

  <!-- Right: canvas + controls -->
  <section class="canvas-area">

    <!-- Pattern stamp buttons -->
    <div class="pattern-row" id="patternRow">
      <button class="pbtn" data-p="glider">Glider</button>
      <button class="pbtn" data-p="blinker">Blinker</button>
      <button class="pbtn" data-p="block">Block</button>
      <button class="pbtn" data-p="lwss">LWSS</button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
      <button class="ctrl-btn" onclick="clearGrid()">↺ Clear</button>
      <button class="ctrl-btn" onclick="rotatePattern()">↻ Rotate</button>
      <button class="ctrl-btn" onclick="flipPattern()">⇄ Flip</button>
      <button class="ctrl-btn" onclick="stepGrid()">⊙ Step</button>
      <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    </div>

    <div class="gen-display">gen <span id="genNum">0</span></div>
  </section>

</div>

<!-- Footer -->
<footer class="lesson-footer">
  <a class="foot-btn" href="/training/lesson2">← Lesson 2</a>
  <a class="foot-btn hi" href="/training/lesson4">Lesson 4: Zoom &amp; Pan →</a>
</footer>

<script>
/* ── Patterns (center-relative [dc, dr]) ─────────── */
const BASE_PATTERNS = {
  glider:  [[-1,1],[0,-1],[0,1],[1,0],[1,1]],
  blinker: [[0,-1],[0,0],[0,1]],
  block:   [[-1,-1],[0,-1],[-1,0],[0,0]],
  lwss:    [[-2,0],[-1,-1],[2,-1],[-2,1],[2,1],[-1,2],[0,2],[1,2]],
};

// Rotation & flip state
let rotN    = 0;   // 0-3  (×90°)
let flipped = false;

function transformCells(cells) {
  let out = cells.map(([dc, dr]) => {
    if (flipped) dc = -dc;
    // rotate rotN times: [dc,dr] → [-dr,dc]
    for (let i = 0; i < rotN; i++) {
      const tmp = dc;
      dc = -dr;
      dr = tmp;
    }
    return [dc, dr];
  });
  return out;
}

let currentPatternName = 'glider';

function getTransformedPattern(name) {
  return transformCells(BASE_PATTERNS[name] || []);
}

function rotatePattern() {
  rotN = (rotN + 1) % 4;
  // re-stamp current pattern
  stampCurrentPattern();
}

function flipPattern() {
  flipped = !flipped;
  stampCurrentPattern();
}

function stampCurrentPattern() {
  if (running) togglePlay();
  grid.fill(0);
  generation = 0;
  const cells = getTransformedPattern(currentPatternName);
  const offC = Math.floor(COLS / 2), offR = Math.floor(ROWS / 2);
  cells.forEach(([dc, dr]) => {
    const c = offC + dc, r = offR + dr;
    if (c >= 0 && c < COLS && r >= 0 && r < ROWS) grid[idx(c, r)] = 1;
  });
  draw();
}

/* ── Stage definitions ──────────────────────────── */
function _setup(fn) {
  return () => { if (running) togglePlay(); grid.fill(0); generation = 0; rotN = 0; flipped = false; fn(); draw(); };
}

const STAGES = [
  {
    title: 'Patterns',
    text: `Patterns are named configurations with known behaviors.<br><br>Click a pattern button above the canvas to stamp it centered. Try clicking <b>Glider</b> then <b>Play</b> to watch it travel diagonally across the grid.<br><br>Explore the others too — each behaves differently.`,
    setup: _setup(() => stampCurrentPattern()),
    resetLabel: '↺ Clear',
  },
  {
    title: 'The Glider',
    rule: `The Glider travels diagonally.<br>Every <b>4 generations</b> it moves one cell.`,
    text: `The Glider is the simplest moving pattern in Life. It cycles through 4 shapes before returning to its original form, shifted one cell diagonally.<br><br>Click <b>Glider</b> above to load one, then hit <b>Play</b> and watch it travel.`,
    setup: _setup(() => { currentPatternName = 'glider'; stampCurrentPattern(); }),
    resetLabel: '↺ Reload Glider',
    highlights: [{ c0: 8, r0: 5, c1: 10, r1: 7, color: '#ffb400', pulse: true, label: 'watch this travel' }],
  },
  {
    title: 'Rotate',
    text: `Click <b>Blinker</b> above to load a Blinker — normally horizontal.<br><br>Click <b>Rotate</b> to spin it 90°. It becomes vertical. Rotate again to go back.<br><br>Rotation applies before stamping, so you can aim a pattern in any of 4 orientations before it lands on the canvas.`,
    setup: _setup(() => { currentPatternName = 'blinker'; stampCurrentPattern(); }),
    resetLabel: '↺ Reload Blinker',
  },
  {
    title: 'Flip',
    text: `Load a <b>Glider</b> and click <b>Flip</b> — it mirrors left-to-right. Combined with Rotate, you get all 8 orientations.<br><br>This matters for aimed patterns: a Glider travels in a direction determined by its orientation. Rotate + Flip let you point it anywhere.<br><br>Try it: stamp a Glider, Flip it, Play — it now travels a different direction.`,
    setup: _setup(() => { currentPatternName = 'glider'; stampCurrentPattern(); }),
    resetLabel: '↺ Reload Glider',
  },
  {
    title: 'Try It',
    text: `Combine patterns to build bigger structures. Try placing multiple patterns — what happens when a Glider runs into a Block?<br><br>In the main game you can drag patterns directly onto the canvas from the side panel, with live rotation and flip.<br><br>Head to <b>Lesson 4</b> when ready.`,
    setup: _setup(() => {}),
    resetLabel: '↺ Clear',
    final: true,
  },
];

/* ── Grid setup ──────────────────────────────────── */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const COLS   = 18;
const ROWS   = 13;

function computeCell() {
  const maxW = Math.min(window.innerWidth <= 720 ? window.innerWidth - 56 : 560, 560);
  return Math.max(22, Math.floor(maxW / COLS));
}
let CELL = computeCell();
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

let grid       = new Uint8Array(COLS * ROWS);
let generation = 0;
let running    = false;
let rafId      = null;
let lastStep   = 0;
const INTERVAL = 180;

function idx(c, r) { return r * COLS + c; }

function countNeighbors(c, r) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nc = c + dc, nr = r + dr;
      if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS) n += grid[idx(nc, nr)];
    }
  return n;
}

/* ── Drawing ─────────────────────────────────────── */
function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#181818';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, ROWS * CELL); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke();
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const alive = grid[idx(c, r)];
      const n     = countNeighbors(c, r);
      const willLive = alive ? (n === 2 || n === 3) : (n === 3);
      const cx = c * CELL, cy = r * CELL;
      if (alive) {
        ctx.fillStyle = willLive ? '#1db954' : '#c0392b';
        ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      } else if (n === 3) {
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      }
    }
  }

  // Stage guidance — animated enclosures, shown at gen 0 only (before stepping)
  if (generation === 0) {
    const stage = STAGES[currentStage];
    if (stage && stage.highlights) drawGuides(stage.highlights);
  }

  document.getElementById('genNum').textContent = generation;
}

/* ── Guidance overlay (marching-ants + pulse) ────── */
function drawGuides(highlights) {
  const now    = performance.now();
  const dashLen = Math.max(5, Math.floor(CELL * 0.25));
  const offset  = -(now / 28) % (dashLen * 2);   // marching ants
  const pulse   = 0.5 + 0.5 * Math.sin(now / 480); // 0..1 breathing

  highlights.forEach(({ c0, r0, c1, r1, color = '#ffb400', pulse: doPulse = false, label }) => {
    const x = c0 * CELL;
    const y = r0 * CELL;
    const w = (c1 - c0 + 1) * CELL;
    const h = (r1 - r0 + 1) * CELL;

    // Pulsing glow fill
    if (doPulse) {
      ctx.globalAlpha = 0.06 + 0.10 * pulse;
      ctx.fillStyle = color;
      ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
      ctx.globalAlpha = 1;
    }

    // Animated dashed enclosure
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.setLineDash([dashLen, dashLen]);
    ctx.lineDashOffset = offset;
    ctx.strokeRect(x + 1.5, y + 1.5, w - 3, h - 3);
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;

    // Secondary text label — legible chip with background behind text
    if (label) {
      const fontPx = Math.max(13, Math.floor(CELL * 0.42));
      ctx.save();
      ctx.font = `bold ${fontPx}px 'Courier New', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const padX = 8, padY = 5, radius = 4;
      const tw = ctx.measureText(label).width;
      const chipW = tw + padX * 2;
      const chipH = fontPx + padY * 2;
      const chipCX = x + w / 2;
      const chipBottom = y - 4;            // sit just above the box
      const chipX = chipCX - chipW / 2;
      const chipY = chipBottom - chipH;

      // Rounded-rect chip background
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(chipX, chipY, chipW, chipH, radius);
      } else {
        const rr = Math.min(radius, chipW / 2, chipH / 2);
        ctx.moveTo(chipX + rr, chipY);
        ctx.lineTo(chipX + chipW - rr, chipY);
        ctx.arcTo(chipX + chipW, chipY, chipX + chipW, chipY + rr, rr);
        ctx.lineTo(chipX + chipW, chipY + chipH - rr);
        ctx.arcTo(chipX + chipW, chipY + chipH, chipX + chipW - rr, chipY + chipH, rr);
        ctx.lineTo(chipX + rr, chipY + chipH);
        ctx.arcTo(chipX, chipY + chipH, chipX, chipY + chipH - rr, rr);
        ctx.lineTo(chipX, chipY + rr);
        ctx.arcTo(chipX, chipY, chipX + rr, chipY, rr);
        ctx.closePath();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(8,8,8,0.85)';
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = color;
      ctx.stroke();

      // Bright label text on top
      const LABEL_TINT = { '#ffb400': '#ffe08a', '#1db954': '#7dffa8', '#e05252': '#ff9d9d', '#c0392b': '#ff9d9d' };
      const tint = LABEL_TINT[color] || '#ffffff';
      ctx.fillStyle = tint;
      ctx.fillText(label, chipCX, chipY + chipH / 2 + 0.5);
      ctx.restore();
    }
  });
}

/* ── Always-on guidance animation (never steps) ──── */
function guideTick() {
  if (!running && generation === 0) {
    const stage = STAGES[currentStage];
    if (stage && stage.highlights) draw();
  }
  requestAnimationFrame(guideTick);
}
requestAnimationFrame(guideTick);

/* ── Simulation ──────────────────────────────────── */
function stepGrid() {
  const next = new Uint8Array(COLS * ROWS);
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const n = countNeighbors(c, r);
      const alive = grid[idx(c, r)];
      next[idx(c, r)] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
    }
  grid = next;
  generation++;
  draw();
}

function loop(ts) {
  if (!running) return;
  if (ts - lastStep >= INTERVAL) { stepGrid(); lastStep = ts; }
  rafId = requestAnimationFrame(loop);
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('playBtn');
  btn.textContent = running ? '⏸ Pause' : '▶ Play';
  btn.classList.toggle('active', running);
  if (running) rafId = requestAnimationFrame(loop);
  else if (rafId) cancelAnimationFrame(rafId);
}

function clearGrid() {
  if (running) togglePlay();
  grid.fill(0);
  generation = 0;
  draw();
}

/* ── Pattern button clicks ───────────────────────── */
document.getElementById('patternRow').addEventListener('click', e => {
  const btn = e.target.closest('.pbtn');
  if (!btn) return;
  const name = btn.dataset.p;
  if (!BASE_PATTERNS[name]) return;
  // update active highlight
  document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPatternName = name;
  stampCurrentPattern();
});

/* ── Canvas interaction ──────────────────────────── */
let painting = false, paintVal = 1;

function cellAt(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top)  * scaleY;
  return { c: Math.floor(x / CELL), r: Math.floor(y / CELL) };
}

canvas.addEventListener('mousedown', e => {
  const { c, r } = cellAt(e);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
  paintVal = grid[idx(c, r)] ? 0 : 1;
  painting = true;
  grid[idx(c, r)] = paintVal;
  draw();
});
canvas.addEventListener('mousemove', e => {
  if (!painting) return;
  const { c, r } = cellAt(e);
  if (c >= 0 && c < COLS && r >= 0 && r < ROWS) { grid[idx(c, r)] = paintVal; draw(); }
});
canvas.addEventListener('mouseup',    () => { painting = false; });
canvas.addEventListener('mouseleave', () => { painting = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const { c, r } = cellAt(t);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
  paintVal = grid[idx(c, r)] ? 0 : 1;
  painting = true;
  grid[idx(c, r)] = paintVal;
  draw();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const { c, r } = cellAt(t);
  if (painting && c >= 0 && c < COLS && r >= 0 && r < ROWS) { grid[idx(c, r)] = paintVal; draw(); }
}, { passive: false });
canvas.addEventListener('touchend', () => { painting = false; });

/* ── Stage system ────────────────────────────────── */
let currentStage = 0;

function buildDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  STAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentStage ? ' done' : i === currentStage ? ' active' : '');
    d.title = STAGES[i].title;
    d.onclick = () => goToStage(i);
    container.appendChild(d);
  });
}

function renderStage() {
  const s = STAGES[currentStage];
  document.getElementById('stageNum').textContent   = `STAGE ${currentStage + 1} / ${STAGES.length}`;
  document.getElementById('stageTitle').textContent = s.title;
  document.getElementById('stageText').innerHTML    = s.text;
  const rb = document.getElementById('ruleBox');
  if (s.rule) {
    rb.style.display = '';
    rb.innerHTML = s.rule;
    rb.className = 'rule-box' + (s.ruleClass ? ' ' + s.ruleClass : '');
  } else { rb.style.display = 'none'; }

  const exBtn = document.getElementById('exampleBtn');
  if (s.resetLabel) {
    exBtn.style.display = '';
    exBtn.textContent   = s.resetLabel;
    exBtn.onclick       = () => s.setup && s.setup();
  } else {
    exBtn.style.display = 'none';
  }

  document.getElementById('backBtn').disabled = currentStage === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (currentStage === STAGES.length - 1) {
    nextBtn.textContent = 'Finish ✓';
    nextBtn.onclick     = () => { markVisited(); window.location.href = '/training'; };
  } else {
    nextBtn.textContent = 'Continue →';
    nextBtn.onclick     = nextStage;
  }

  if (s.setup) s.setup();
  buildDots();
}

function goToStage(i) { currentStage = i; renderStage(); }
function nextStage()   { if (currentStage < STAGES.length - 1) { currentStage++; renderStage(); } }
function prevStage()   { if (currentStage > 0) { currentStage--; renderStage(); } }

/* ── Visited tracking ───────────────────────────── */
function markVisited() {
  try {
    const key  = 'lifegame_training_visited';
    const set  = new Set(JSON.parse(localStorage.getItem(key) || '[]'));
    set.add(3);
    localStorage.setItem(key, JSON.stringify([...set]));
  } catch {}
}
markVisited();

/* ── Resize ─────────────────────────────────────── */
window.addEventListener('resize', () => {
  CELL = computeCell();
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  draw();
});

/* ── Init ────────────────────────────────────────── */
renderStage();
</script>
</body>
</html>
