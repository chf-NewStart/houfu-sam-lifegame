<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escape Grid // houfu.xyz</title>
  <link rel="icon" type="image/png" href="/game/brand-favicon.png?v=3">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Consolas, 'Courier New', monospace;
      background: #080808; color: #ccc;
      min-height: 100vh; padding: 20px 16px;
    }

    .pg-header { max-width: 880px; margin: 0 auto 18px; }
    .pg-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .pg-title { color: #1db954; font-size: 1.4rem; text-transform: uppercase; letter-spacing: -1px; }
    .pg-sub { color: #9a9a9a; font-size: 0.75rem; margin-top: 4px; line-height: 1.6; max-width: 560px; }
    .pg-back { font-size: 0.72rem; color: #1db954; text-decoration: none; margin-top: 6px; display: inline-block; }
    .pg-back:hover { text-decoration: underline; }
    .lang-btn { background: transparent; border: 1px solid #1db954; color: #1db954; font-family: Consolas, monospace; font-size: 0.72rem; padding: 5px 11px; cursor: pointer; flex-shrink: 0; transition: background 0.1s; }
    .lang-btn:hover { background: rgba(29,185,84,0.1); }

    .layout { display: flex; gap: 20px; align-items: flex-start; max-width: 880px; margin: 0 auto; position: relative; }
    .board-col { flex: 0 0 auto; }
    .panel-col { flex: 1; min-width: 0; }

    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; font-size: 0.68rem; color: #777; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .leg { display: inline-block; width: 20px; height: 0; }

    #boardWrap { position: relative; }
    .board { display: grid; grid-template-columns: repeat(4, 112px); grid-template-rows: repeat(4, 112px); background: #080808; position: relative; z-index: 1; }
    .cell { position: relative; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 3px; padding: 6px; background: #101010; transition: background 0.12s, box-shadow 0.12s; }
    .cell.exit { background: rgba(29,185,84,0.09); }
    .cell.placeable:hover { background: rgba(29,185,84,0.06); cursor: pointer; }
    /* click-to-play affordances */
    .cell.can-move   { cursor: pointer; box-shadow: inset 0 0 0 2px rgba(29,185,84,0.55); }
    .cell.can-move:hover { background: rgba(29,185,84,0.16); }
    .cell.can-open   { cursor: pointer; box-shadow: inset 0 0 0 2px rgba(255,206,77,0.55); }
    .cell.can-open:hover { background: rgba(255,206,77,0.12); }
    .cell.can-seal   { cursor: pointer; box-shadow: inset 0 0 0 2px rgba(244,67,54,0.55); }
    .cell.can-seal:hover { background: rgba(244,67,54,0.12); }
    .cell.can-attack { cursor: pointer; box-shadow: inset 0 0 0 3px #f44336; animation: atk-pulse 1s ease-in-out infinite; }
    @keyframes atk-pulse { 0%,100%{box-shadow: inset 0 0 0 3px rgba(244,67,54,0.9);}50%{box-shadow: inset 0 0 0 3px rgba(244,67,54,0.35);} }
    .move-dot { position: absolute; left: 50%; top: 50%; width: 12px; height: 12px; margin: -6px 0 0 -6px; border-radius: 50%; background: rgba(29,185,84,0.7); pointer-events: none; }

    .exit-tag { position: absolute; top: 3px; left: 4px; font-size: 9px; color: #1db954; font-weight: bold; letter-spacing: 1px; }
    .trap-icon { position: absolute; top: 2px; right: 3px; font-size: 15px; line-height: 1; }
    .cell-coord { position: absolute; bottom: 2px; right: 3px; font-size: 8px; color: #1c1c1c; }

    /* animated unit tokens live in an overlay so they slide between cells */
    #unitLayer { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
    .utoken { position: absolute; top: 0; left: 0; width: 30px; height: 30px; margin: -15px 0 0 -15px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold;
      border: 2px solid transparent; box-sizing: border-box;
      transition: transform .34s cubic-bezier(.34,.7,.3,1), opacity .25s, box-shadow .2s; will-change: transform; }
    .utoken.participant { background: rgba(29,185,84,0.2); border-color: #1db954; color: #7ff0a8; }
    .utoken.hunter      { background: rgba(244,67,54,0.22); border-color: #f44336; color: #ff8a80; }
    .utoken.current     { box-shadow: 0 0 0 2px currentColor, 0 0 12px currentColor; }
    .utoken.gone        { opacity: 0; }                    /* fade out in place — no scaling */
    .utoken.hit         { animation: tok-hit .45s ease; }  /* brightness flash only, never resize */
    @keyframes tok-hit { 0%,100%{ filter: none; } 30%{ filter: brightness(2.3) saturate(1.3); } }
    .utoken-hp { position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%); font-size: 7px; color: #aaa; white-space: nowrap; text-shadow: 0 1px 2px #000; }
    .badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid transparent; position: relative; flex-shrink: 0; z-index: 2; }
    .badge.participant { background: rgba(29,185,84,0.18); border-color: #1db954; color: #7ff0a8; }
    .badge.hunter      { background: rgba(244,67,54,0.2);  border-color: #f44336; color: #ff8a80; }

    .pcard { background: #111; border: 1px solid #1c1c1c; padding: 11px 13px; margin-bottom: 8px; }
    .pcard-title { color: #1db954; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #1a1a1a; }

    .turn-bar { border: 1px solid #1db954; padding: 8px 12px; color: #1db954; font-size: 0.82rem; margin-bottom: 8px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .turn-bar.hunter-t { border-color: #f44336; color: #f44336; }
    .turn-bar .who-tag { font-size:0.64rem; opacity:0.8; text-transform:uppercase; letter-spacing:1px; }

    .win-banner { display: none; padding: 10px; text-align: center; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .win-banner.win-p { display: block; color: #1db954; border: 2px solid #1db954; }
    .win-banner.win-h { display: block; color: #f44336;  border: 2px solid #f44336; }

    .ucards { display: flex; flex-wrap: wrap; gap: 5px; }
    .ucard { flex: 1; min-width: 56px; background: #0d0d0d; border: 1px solid #1c1c1c; padding: 6px 7px; font-size: 0.68rem; }
    .ucard.active { border-color: #1db954; box-shadow: 0 0 8px rgba(29,185,84,0.25); }
    .ucard.hunter-c.active { border-color: #f44336; box-shadow: 0 0 8px rgba(244,67,54,0.25); }
    .ucard .uname { color: #bbb; margin-bottom: 3px; }
    .ucard.hunter-c .uname { color: #f44336; }
    .hpbar  { height: 3px; background: #1a1a1a; margin: 3px 0; }
    .hpfill { height: 100%; background: #1db954; transition: width 0.3s; }
    .hunter-c .hpfill { background: #f44336; }
    .ustat  { color: #8a8a8a; font-size: 0.62rem; }

    .hint { font-size: 0.7rem; color: #8a8a8a; line-height: 1.55; margin-bottom: 9px; border-left: 2px solid #1db95455; padding-left: 8px; }
    .hint b { color: #1db954; }

    .brow { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .btn { flex: 1; background: transparent; border: 1px solid #2a2a2a; color: #999; font-family: Consolas, monospace; font-size: 0.74rem; padding: 9px 8px; cursor: pointer; transition: all 0.1s; white-space: nowrap; }
    .btn:hover:not(:disabled) { border-color: #1db954; color: #1db954; }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn.attack { border-color: #f4433655; color: #f47a70; }
    .btn.attack:hover:not(:disabled) { border-color: #f44336; color: #f44336; }
    .btn.seal.on { border-color: #f44336; color: #f44336; background: rgba(244,67,54,0.1); }
    .btn.full { flex: 0 0 100%; }
    @keyframes btn-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.3);}50%{box-shadow:0 0 0 5px rgba(255,255,255,0);} }
    .btn.new-game-glow   { border-color: #1db954; color: #1db954; animation: btn-pulse 1.4s ease-in-out infinite; }
    .btn.new-game-glow-h { border-color: #f44336; color: #f44336; animation: btn-pulse 1.4s ease-in-out infinite; }

    .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
    .tbtn { background: #0d0d0d; border: 1px solid #2a2a2a; color: #999; font-family: Consolas, monospace; font-size: 0.68rem; padding: 8px 10px; cursor: pointer; text-align: left; transition: all 0.1s; line-height: 1.5; }
    .tbtn:hover:not(:disabled) { border-color: #888; color: #bbb; }
    .tbtn.sel  { border-color: #1db954; color: #1db954; background: rgba(29,185,84,0.08); }
    .tbtn:disabled { opacity: 0.3; cursor: not-allowed; }

    .haz { display:grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 0.64rem; color: #9a9a9a; }
    .haz span { display:flex; align-items:center; gap:6px; }
    .haz .hz-em { font-size: 0.95rem; }

    .log { max-height: 150px; overflow-y: auto; font-size: 0.7rem; line-height: 1.75; }
    .log div            { color: #777; }
    .log div.log-action { color: #aaa; }
    .log div.log-event  { color: #1db954; }
    .log div.log-danger { color: #f44336; }
    .log div.log-round  { color: #888; border-top: 1px solid #1a1a1a; margin-top: 3px; padding-top: 3px; }

    /* mode-select overlay */
    .mode-overlay { position: fixed; inset: 0; background: rgba(6,7,8,0.93); z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px; }
    .mode-overlay.show { display: flex; }
    .mode-box { max-width: 460px; width: 100%; text-align: center; }
    .mode-box h2 { color: #1db954; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .mode-box p { color: #888; font-size: 0.74rem; line-height: 1.6; margin-bottom: 18px; }
    .mode-btn { display: block; width: 100%; text-align: left; background: #0e0e0e; border: 1px solid #262626; color: #ddd; font-family: inherit; font-size: 0.86rem; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.12s; }
    .mode-btn:hover { border-color: #1db954; background: rgba(29,185,84,0.06); }
    .mode-btn.hunter:hover { border-color: #f44336; background: rgba(244,67,54,0.06); }
    .mode-btn .mb-em { font-size: 1.15rem; margin-right: 8px; }
    .mode-btn .mb-sub { display: block; color: #777; font-size: 0.68rem; margin-top: 4px; line-height: 1.5; }

    @media (max-width: 660px) {
      .layout { flex-direction: column; }
      .board { grid-template-columns: repeat(4, 78px); grid-template-rows: repeat(4, 78px); }
      .badge { width: 22px; height: 22px; font-size: 8px; }
      .trap-icon { font-size: 13px; }
    }
    /* prevent double-tap-to-zoom on fast taps — keeps scroll + pinch */
    html, body, button, a, input, select, label { touch-action: manipulation; }
  </style>
</head>
<body>

<div class="pg-header">
  <div class="pg-header-row">
    <div>
      <div class="pg-title" id="pgTitle">Escape Grid</div>
      <div class="pg-sub" id="pgSub"></div>
      <a class="pg-back" id="pgBack" href="/">← arcade</a>
    </div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">中文</button>
  </div>
</div>

<div class="layout">
  <div class="board-col">
    <div class="legend">
      <span><span class="leg" style="border-top:2px dashed rgba(29,185,84,0.55)"></span><span data-en="Open"   data-zh="开启">Open</span></span>
      <span><span class="leg" style="border-top:3px solid #484848"></span><span data-en="Closed" data-zh="关闭">Closed</span></span>
      <span><span class="leg" style="border-top:3px solid #b71c1c"></span><span data-en="Locked" data-zh="锁定">Locked</span></span>
      <span><span class="leg" style="border-top:3px double #00bcd4"></span><span data-en="Frozen" data-zh="冰冻">Frozen</span></span>
    </div>
    <div id="boardWrap"><div id="gameBoard" class="board"></div><div id="unitLayer"></div></div>
    <div style="font-size:0.64rem;color:#5a5a5a;margin-top:6px;" id="boardHint"></div>
  </div>

  <div class="panel-col">
    <div id="winBanner" class="win-banner"></div>
    <div id="turnBar" class="turn-bar"></div>

    <div class="pcard" id="objectiveCard" style="display:none">
      <div class="pcard-title" data-en="// your goal" data-zh="// 你的目标">// your goal</div>
      <div class="hint" id="objectiveText" style="margin-bottom:0;border-left-color:#1db95455"></div>
    </div>

    <div class="pcard">
      <div class="pcard-title" data-en="// units" data-zh="// 单位">// units</div>
      <div class="ucards" id="unitCards"></div>
    </div>

    <div class="pcard" id="setupPanel" style="display:none">
      <div class="pcard-title" data-en="// place your traps · pick one → click a cell" data-zh="// 布置陷阱 · 选择 → 点击格子">// place your traps · pick one → click a cell</div>
      <div class="tool-grid" id="toolGrid"></div>
      <div style="font-size:0.68rem;color:#888;margin-bottom:8px;" data-en="Click a placed trap again to remove it." data-zh="再次点击已放陷阱可移除。">Click a placed trap again to remove it.</div>
      <div style="display:flex;gap:6px;">
        <button class="btn" id="startBtn" onclick="finishSetup()" disabled></button>
        <button class="btn" id="randBtn"  onclick="game && game.randomizeTools()"></button>
      </div>
    </div>

    <div class="pcard" id="controlPanel" style="display:none">
      <div class="pcard-title" data-en="// your move" data-zh="// 你的行动">// your move</div>
      <div class="hint" id="playHint"></div>
      <div class="brow">
        <button class="btn attack" id="attackBtn" onclick="game && game.attack()" data-en="⚔️ Attack" data-zh="⚔️ 攻击">⚔️ Attack</button>
        <button class="btn seal" id="sealBtn" onclick="game && game.toggleSeal()"></button>
      </div>
      <div class="brow">
        <button class="btn" id="undoBtn" onclick="undoMove()" data-en="↶ Undo" data-zh="↶ 撤销">↶ Undo</button>
        <button class="btn" id="endTurnBtn" onclick="endTurn()" data-en="⏭ End Turn" data-zh="⏭ 结束回合">⏭ End Turn</button>
      </div>
    </div>

    <div class="pcard">
      <div class="pcard-title" data-en="// hazards" data-zh="// 陷阱">// hazards</div>
      <div class="haz" id="hazLegend"></div>
    </div>

    <div class="pcard">
      <div class="pcard-title" data-en="// game" data-zh="// 游戏">// 游戏</div>
      <div style="display:flex;gap:6px;">
        <button class="btn" id="newGameBtn" onclick="openModeSelect()" data-en="⟳ New Game" data-zh="⟳ 新游戏">⟳ New Game</button>
      </div>
    </div>

    <div class="pcard">
      <div class="pcard-title" data-en="// log" data-zh="// 日志">// log</div>
      <div class="log" id="gameLog"></div>
    </div>
  </div>
</div>

<!-- mode-select overlay -->
<div class="mode-overlay" id="modeOverlay">
  <div class="mode-box">
    <h2 id="moTitle">Escape Grid</h2>
    <p id="moDesc"></p>
    <button class="mode-btn" onclick="chooseSide('runners')">
      <span class="mb-em">🏃</span><span id="moRun">Play the Runners</span>
      <span class="mb-sub" id="moRunSub">Control all 4 escapees vs the AI hunter. Reach the exit.</span>
    </button>
    <button class="mode-btn hunter" onclick="chooseSide('hunter')">
      <span class="mb-em">🎯</span><span id="moHunt">Play the Hunter</span>
      <span class="mb-sub" id="moHuntSub">Place traps, then chase the AI escapees. Catch them all.</span>
    </button>
    <button class="mode-btn" onclick="chooseSide('watch')">
      <span class="mb-em">👁</span><span id="moWatch">Watch AI vs AI</span>
      <span class="mb-sub" id="moWatchSub">Sit back and watch the hunter and escapees play it out.</span>
    </button>
  </div>
</div>

<script>
/* ── i18n ─────────────────────────────────────────────── */
let lang = 'en';
function t(en, zh)  { return lang === 'zh' ? zh : en; }
function tDir(d)    { return lang === 'zh' ? ({up:'上',down:'下',left:'左',right:'右'}[d]||d) : d; }
function tState(s)  { return lang === 'zh' ? ({open:'开启',closed:'关闭',locked:'锁定'}[s]||s) : s; }
function tVerb(v)   { return lang === 'zh' ? ({unlock:'解锁',open:'开启',close:'关闭',lock:'锁定'}[v]||v) : v; }

const TRAP_EMOJI = {'XX':'💥','■':'❄️','☆':'💀','✦':'⚡','△':'💚','+':'💫'};
const TRAP_INFO = {
  'XX':{en:'Damage',zh:'伤害',den:'−1 HP on entry',dzh:'进入时 −1 血'},
  '■' :{en:'Freeze',zh:'冰冻',den:'freezes adjacent doors shut',dzh:'冻结相邻的门'},
  '☆' :{en:'Trapdoor',zh:'陷阱门',den:'instant kill on entry',dzh:'进入即淘汰'},
  '✦' :{en:'Dash',zh:'冲刺',den:'+1 extra move',dzh:'+1 次移动'},
  '△' :{en:'Medkit',zh:'复活',den:'survive one death',dzh:'免疫一次死亡'},
  '+' :{en:'Stun',zh:'眩晕',den:'enemy skips next turn',dzh:'对手跳过下回合'},
};

function applyLang() {
  document.getElementById('pgTitle').textContent = t('Escape Grid','逃脱方格');
  document.getElementById('pgSub').innerHTML = lang === 'zh'
    ? `4 名<span style="color:#1db954">逃跑者</span>从 (0,0) 出发，冲向右下角的<span style="color:#1db954">出口</span>；1 名<span style="color:#f44336">猎手</span>要在此之前抓住所有人。逃跑者每回合 1 步，猎手每回合 4 步。`
    : `4 <span style="color:#1db954">runners</span> start top-left and race to the <span style="color:#1db954">exit</span> bottom-right; 1 <span style="color:#f44336">hunter</span> tries to catch them all first. Runners take 1 step per turn, the hunter takes 4.`;
  document.getElementById('pgBack').textContent = t('← arcade','← 游戏厅');
  document.querySelectorAll('[data-en]').forEach(el => { el.textContent = t(el.dataset.en, el.dataset.zh); });

  // mode overlay text
  document.getElementById('moTitle').textContent = t('Escape Grid','逃脱方格');
  document.getElementById('moDesc').textContent = t('4 runners racing to the exit, 1 hunter chasing. Who do you want to be?','4 名逃跑者冲向出口，1 名猎手追捕。你想扮演谁？');
  document.getElementById('moRun').textContent = t('Play the Runners','扮演逃跑者');
  document.getElementById('moRunSub').textContent = t('Control all 4 escapees vs the AI hunter. Reach the exit.','操控 4 名逃跑者对抗 AI 猎手，抵达出口。');
  document.getElementById('moHunt').textContent = t('Play the Hunter','扮演猎手');
  document.getElementById('moHuntSub').textContent = t('Place traps, then chase the AI escapees. Catch them all.','布置陷阱，追捕 AI 逃跑者，抓住所有人。');
  document.getElementById('moWatch').textContent = t('Watch AI vs AI','观看 AI 对战');
  document.getElementById('moWatchSub').textContent = t('Sit back and watch the hunter and escapees play it out.','坐下来看猎手与逃跑者一决高下。');

  renderHazards();
  updateObjective();
  const sb=document.getElementById('sealBtn');
  if(sb) sb.textContent = (game&&game.sealMode) ? t('🔓 Move mode','🔓 移动模式') : t('🔒 Block door','🔒 封门');
  const bh=document.getElementById('boardHint');
  if(bh) bh.textContent = t('Door state = cell border. During setup, click a cell to place a trap.','门的状态显示为格子边框。布置阶段点击格子放陷阱。');

  if (game?.phase === 'setup') game.refreshSetupUI();
  if (game) game.render();
  else document.getElementById('turnBar').textContent = t('Choose a side to begin','选择一方开始');
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'zh' ? 'English' : '中文';
  applyLang();
  try { localStorage.setItem('arcade_lang', lang); } catch (e) {}
}

function renderHazards(){
  const host=document.getElementById('hazLegend'); if(!host) return;
  host.innerHTML='';
  for(const sym of ['XX','☆','■','+','✦','△']){
    const info=TRAP_INFO[sym];
    const s=document.createElement('span');
    s.innerHTML=`<span class="hz-em">${TRAP_EMOJI[sym]}</span><span>${t(info.en,info.zh)} — ${t(info.den,info.dzh)}</span>`;
    host.appendChild(s);
  }
}

function updateObjective(){
  const card=document.getElementById('objectiveCard'), txt=document.getElementById('objectiveText');
  if(!card||!txt) return;
  if(!game || humanSide==='watch'){ card.style.display='none'; return; }
  card.style.display='block';
  if(humanSide==='runners')
    txt.innerHTML=t('Get <b>any one</b> runner to the exit to win — or gang up and take down the hunter. Watch the hazards; the hunter moves 4× as fast as you.',
                    '让<b>任意一名</b>逃跑者抵达出口即胜——或合力击败猎手。小心陷阱；猎手的速度是你的 4 倍。');
  else
    txt.innerHTML=t('<b>Eliminate all 4 runners</b> before any reaches the exit. You move 4 steps per turn (no attack on round 1). Use traps and locked doors to corner them.',
                    '在任何人抵达出口前<b>淘汰全部 4 名逃跑者</b>。你每回合走 4 步（第 1 轮不能攻击）。用陷阱和锁门把他们逼入绝境。');
}

/* ── Door CSS ─────────────────────────────────────────── */
function doorCSS(state, frozen) {
  if (frozen)             return '3px double #00bcd4';
  if (state === 'open')   return '2px dashed rgba(29,185,84,0.5)';
  if (state === 'closed') return '3px solid #484848';
  if (state === 'locked') return '3px solid #b71c1c';
  return '1px solid #181818';
}

/* ── Dijkstra pathfinder ──────────────────────────────── */
function findPath(sx, sy, ex, ey, doors, frozenDoors, dkeyFn) {
  const idx = (x,y) => x*4+y;
  const INF = 1e9;
  const dist = Array(16).fill(INF), prev = Array(16).fill(-1);
  dist[idx(sx,sy)] = 0;
  const vis = new Set();
  for (;;) {
    let u=-1, ud=INF;
    for (let i=0;i<16;i++) if (!vis.has(i)&&dist[i]<ud){ud=dist[i];u=i;}
    if (u===-1||u===idx(ex,ey)) break;
    vis.add(u);
    const x=Math.floor(u/4), y=u%4;
    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx=x+dx, ny=y+dy;
      if (nx<0||nx>3||ny<0||ny>3) continue;
      const k=dkeyFn(x,y,nx,ny);
      if (frozenDoors.has(k)) continue;
      const s=doors.get(k);
      const c=s==='open'?1:s==='closed'?2:s==='locked'?3:INF;
      if (c===INF) continue;
      const nd=dist[u]+c, v=idx(nx,ny);
      if (nd<dist[v]){dist[v]=nd;prev[v]=u;}
    }
  }
  const endK=idx(ex,ey);
  if (dist[endK]===INF) return null;
  const path=[]; let cur=endK;
  while (cur!==idx(sx,sy)){path.unshift({x:Math.floor(cur/4),y:cur%4});cur=prev[cur];if(cur===-1)return null;}
  return path;
}
function dirTo(fx,fy,tx,ty){if(tx>fx)return'right';if(tx<fx)return'left';if(ty>fy)return'down';return'up';}

/* ── Game Engine ──────────────────────────────────────── */
class GameEngine {
  constructor() {
    this.grid=[]; this.phase='idle'; this.selectedTool=null; this.sealMode=false;
    this.toolbox={'XX':1,'■':1,'☆':1,'✦':1,'△':1,'+':1};
    this.frozenDoors=new Set(); this.stunHunter=0; this.stunPart=0;
    this.participants=[]; this.hunter=null;
    this.doors=new Map(); this.currentTurn=0; this.currentUnitIndex=0;
    this.gameOver=false; this.winner=null;
  }

  init() {
    this.grid=Array(4).fill(null).map(()=>Array(4).fill(null).map(()=>({units:[],symbol:null,isExit:false})));

    // All units start at (0,0). Runners: 1 move + 1 attack. Hunter: 4 moves + 1 attack.
    this.participants=['P1','P2','P3','P4'].map(id=>({
      id, type:'participant', hp:5, maxHp:5, x:0, y:0,
      moves:1, maxMoves:1, attacks:1, maxAttacks:1, hasRevive:false
    }));
    this.hunter={id:'H', type:'hunter', hp:16, maxHp:16, x:0, y:0,
                 moves:4, maxMoves:4, attacks:1, maxAttacks:1, hasRevive:false};

    this.participants.forEach(p=>this.grid[0][0].units.push(p));
    this.grid[0][0].units.push(this.hunter);
    this.grid[3][3].isExit=true;

    this.doors.clear();
    for (let y=0;y<4;y++) for (let x=0;x<4;x++){
      if (x<3) this.doors.set(this.dkey(x,y,x+1,y),'closed');
      if (y<3) this.doors.set(this.dkey(x,y,x,y+1),'closed');
    }

    this.currentTurn=0; this.currentUnitIndex=0;
    this.gameOver=false; this.winner=null; this.sealMode=false;
    this.frozenDoors=new Set(); this.stunHunter=0; this.stunPart=0;
    this.phase='setup'; this.selectedTool=null;
    this.toolbox={'XX':1,'■':1,'☆':1,'✦':1,'△':1,'+':1};
  }

  hasActions(unit) { return unit.moves>0 || unit.attacks>0; }

  /* ── Undo: full-state snapshots taken before each human action.
     The stack is cleared as soon as an AI unit's turn starts, so you can
     rewind freely within your own side's turns but never through the AI's. ── */
  snapshot() {
    const unitData=u=>({id:u.id,type:u.type,hp:u.hp,maxHp:u.maxHp,x:u.x,y:u.y,moves:u.moves,maxMoves:u.maxMoves,attacks:u.attacks,maxAttacks:u.maxAttacks,hasRevive:u.hasRevive,escaped:!!u.escaped});
    return {
      participants:this.participants.map(unitData),
      hunter:unitData(this.hunter),
      doors:[...this.doors.entries()],
      frozen:[...this.frozenDoors],
      symbols:this.grid.map(row=>row.map(c=>c.symbol)),
      stunHunter:this.stunHunter, stunPart:this.stunPart,
      currentTurn:this.currentTurn, currentUnitIndex:this.currentUnitIndex,
      sealMode:this.sealMode,
    };
  }
  restore(s) {
    const load=(u,d)=>{u.hp=d.hp;u.x=d.x;u.y=d.y;u.moves=d.moves;u.attacks=d.attacks;u.hasRevive=d.hasRevive;u.escaped=d.escaped;};
    this.participants.forEach((p,i)=>load(p,s.participants[i]));
    load(this.hunter,s.hunter);
    this.doors=new Map(s.doors);
    this.frozenDoors=new Set(s.frozen);
    for(let y=0;y<4;y++)for(let x=0;x<4;x++){this.grid[y][x].symbol=s.symbols[y][x];this.grid[y][x].units=[];}
    for(const u of [...this.participants,this.hunter]) if(u.hp>0&&!u.escaped) this.grid[u.y][u.x].units.push(u);
    this.stunHunter=s.stunHunter; this.stunPart=s.stunPart;
    this.currentTurn=s.currentTurn; this.currentUnitIndex=s.currentUnitIndex;
    this.sealMode=s.sealMode;
    this.gameOver=false; this.winner=null;
  }
  pushUndo(unit){ if(unit&&isHumanUnit(unit)) undoStack.push(this.snapshot()); }

  participantCanAct(p) {
    if(this.grid[p.y][p.x].units.some(u=>u.type==='hunter'&&u.hp>0)) return true;
    for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){
      const nx=p.x+dx, ny=p.y+dy;
      if(nx<0||nx>3||ny<0||ny>3) continue;
      const k=this.dkey(p.x,p.y,nx,ny);
      if(this.doors.has(k)&&!this.frozenDoors.has(k)) return true;
    }
    return false;
  }

  /* ── Setup ── */
  setTool(sym) { if(this.phase!=='setup')return; this.selectedTool=(this.selectedTool===sym)?null:sym; this.refreshSetupUI(); }

  placeToolAt(x,y) {
    if(this.phase!=='setup')return;
    if((x===0&&y===0)||(x===3&&y===3)){this.log(t('Cannot place on start or exit.','不能放在起点或出口。'));return;}
    const cell=this.grid[y][x];
    if(cell.symbol){this.clearToolAt(x,y);return;}
    if(!this.selectedTool){this.log(t('Select a trap first.','请先选择陷阱。'));return;}
    if(!this.toolbox[this.selectedTool]){this.log(t('None left.','已用完。'));return;}
    cell.symbol=this.selectedTool; this.toolbox[this.selectedTool]--;
    this.render(); this.refreshSetupUI();
  }

  clearToolAt(x,y) {
    if(this.phase!=='setup')return;
    const cell=this.grid[y][x]; if(!cell.symbol)return;
    this.toolbox[cell.symbol]++; cell.symbol=null;
    this.render(); this.refreshSetupUI();
  }

  refreshSetupUI() {
    const grid=document.getElementById('toolGrid'); if(!grid)return; grid.innerHTML='';
    for(const[sym,cnt]of Object.entries(this.toolbox)){
      const tr=TRAP_INFO[sym];
      const b=document.createElement('button');
      b.className='tbtn'+(this.selectedTool===sym?' sel':'');
      b.innerHTML=`<span style="font-size:1.1em;margin-right:5px">${TRAP_EMOJI[sym]}</span><span style="color:#ccc">${t(tr.en,tr.zh)}</span><br><span style="font-size:0.6rem;color:#888">${t(tr.den,tr.dzh)}</span><span style="float:right;color:#aaa">×${cnt}</span>`;
      b.disabled=cnt<=0; b.onclick=()=>this.setTool(sym); grid.appendChild(b);
    }
    const rem=Object.values(this.toolbox).reduce((a,b)=>a+b,0);
    const sb=document.getElementById('startBtn');
    if(sb){sb.disabled=rem>0;sb.textContent=rem>0?t(`Place ${rem} more`,`还需 ${rem} 个`):t('✅ Start hunt','✅ 开始追捕');}
    const rb=document.getElementById('randBtn');
    if(rb)rb.textContent=t('🎲 Random','🎲 随机');
  }

  randomizeTools() {
    if(this.phase!=='setup')return;
    for(let y=0;y<4;y++) for(let x=0;x<4;x++){const c=this.grid[y][x];if(c.symbol){this.toolbox[c.symbol]++;c.symbol=null;}}
    const slots=[];
    for(let y=0;y<4;y++) for(let x=0;x<4;x++) if(!((x===0&&y===0)||(x===3&&y===3)))slots.push({x,y});
    for(let i=slots.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[slots[i],slots[j]]=[slots[j],slots[i]];}
    const pile=[];
    for(const[s,c]of Object.entries(this.toolbox))for(let i=0;i<c;i++)pile.push(s);
    while(pile.length&&slots.length){const sym=pile.pop(),sl=slots.pop();this.grid[sl.y][sl.x].symbol=sym;this.toolbox[sym]--;}
    this.log(t('Traps randomized.','陷阱已随机布置。')); this.render(); this.refreshSetupUI();
  }

  // AI trap placement (used when the human is not the hunter): lethal traps guard the
  // exit approach, freeze near the start to slow the sprint, the rest scattered.
  aiPlaceTraps() {
    if(this.phase!=='setup')return;
    for(let y=0;y<4;y++) for(let x=0;x<4;x++){const c=this.grid[y][x];if(c.symbol){this.toolbox[c.symbol]++;c.symbol=null;}}
    const free=(x,y)=>!((x===0&&y===0)||(x===3&&y===3))&&!this.grid[y][x].symbol;
    const put=(sym,cands)=>{
      if(!this.toolbox[sym])return;
      const pool=cands.filter(([x,y])=>free(x,y));
      const list=pool.length?pool:this._allFree();
      if(!list.length)return;
      const [x,y]=list[Math.floor(Math.random()*list.length)];
      this.grid[y][x].symbol=sym; this.toolbox[sym]--;
    };
    put('☆',[[2,3],[3,2],[2,2]]);        // trapdoor guards the exit approach
    put('XX',[[3,2],[2,3],[1,3],[3,1]]); // damage on the exit corridor
    put('■',[[1,0],[0,1],[1,1]]);         // freeze slows the escape early
    put('+', [[1,2],[2,1],[2,2]]);
    put('✦',this._allFree());
    put('△',this._allFree());
    // any leftovers → random
    for(const[sym,cnt]of Object.entries(this.toolbox)) for(let i=0;i<cnt;i++){const l=this._allFree();if(!l.length)break;const[x,y]=l[Math.floor(Math.random()*l.length)];this.grid[y][x].symbol=sym;this.toolbox[sym]--;}
    this.log(t('Hunter set its traps.','猎手布好了陷阱。'),'danger');
  }
  _allFree(){const l=[];for(let y=0;y<4;y++)for(let x=0;x<4;x++)if(!((x===0&&y===0)||(x===3&&y===3))&&!this.grid[y][x].symbol)l.push([x,y]);return l;}

  finishSetup() {
    if(this.phase!=='setup')return;
    this.phase='play'; this.selectedTool=null;
    document.getElementById('setupPanel').style.display='none';
    document.getElementById('controlPanel').style.display='block';
    this.log(t('[ THE HUNT BEGINS ]','【追捕开始】'),'round');
    this.startTurn();
    startScheduler();
  }

  toggleSeal(){ this.sealMode=!this.sealMode; applyLang(); this.render(); }

  /* ── Turn flow ── */
  startTurn() {
    if(this.gameOver||this.phase!=='play')return;
    this.checkWin(); if(this.gameOver)return;
    const u=this.curUnit();
    if(u){
      // Skips must go through nextTurn() — it hops dead/escaped units and wraps the
      // round. A raw index++ could land on a null unit and freeze the game forever
      // (e.g. hunter stunned at the end of the order).
      if(u.type==='hunter'&&this.stunHunter>0){this.stunHunter--;this.log(t('Hunter stunned — turn skipped.','猎手被眩晕——跳过回合。'),'danger');return this.nextTurn();}
      if(u.type==='participant'&&this.stunPart>0){this.stunPart--;this.log(t(`${u.id} stunned — turn skipped.`,`${u.id}被眩晕——跳过回合。`),'danger');return this.nextTurn();}
      if(u.type==='participant'&&!this.participantCanAct(u)){this.log(t(`${u.id} is boxed in — turn skipped.`,`${u.id}被困——跳过回合。`),'danger');return this.nextTurn();}
    }
    this.sealMode=false;
    const cu=this.curUnit();
    if(cu&&!isHumanUnit(cu))undoStack.length=0;   // can't rewind through the AI's turn
    if(cu){
      cu.moves=cu.maxMoves; cu.attacks=cu.maxAttacks;
      const atkInfo = (cu.type==='hunter'&&this.currentTurn===0) ? t(' · no attack (Rd 1)',' · 不可攻击(第1轮)') : '';
      this.log(t(`[ ${cu.id} ] ${cu.moves} move(s)${atkInfo}`,`[ ${cu.id} ] ${cu.moves}次移动${atkInfo}`),'action');
    }
    applyLang();
  }

  curUnit() {
    if(this.currentUnitIndex<this.participants.length){const p=this.participants[this.currentUnitIndex];return(p&&p.hp>0&&!p.escaped)?p:null;}
    if(this.currentUnitIndex===this.participants.length)return this.hunter.hp>0?this.hunter:null;
    return null;
  }

  nextTurn() {
    if(this.gameOver)return;
    this.currentUnitIndex++;
    while(this.currentUnitIndex<this.participants.length){const p=this.participants[this.currentUnitIndex];if(p&&p.hp>0&&!p.escaped)break;this.currentUnitIndex++;}
    if(this.currentUnitIndex>this.participants.length){
      this.currentUnitIndex=0; this.currentTurn++;
      this.log(t(`--- Round ${this.currentTurn+1} ---`,`--- 第${this.currentTurn+1}轮 ---`),'round');
      while(this.currentUnitIndex<this.participants.length){const p=this.participants[this.currentUnitIndex];if(p&&p.hp>0&&!p.escaped)break;this.currentUnitIndex++;}
    }
    this.startTurn();
  }

  afterAction(unit) {
    this.checkWin();
    if(!this.gameOver){
      if(unit.hp<=0||!this.hasActions(unit)) this.nextTurn();
      else this.render();
    }
  }

  /* ── Door helpers ── */
  dkey(x1,y1,x2,y2){return(x1>x2||(x1===x2&&y1>y2))?`${x2},${y2}-${x1},${y1}`:`${x1},${y1}-${x2},${y2}`;}
  dstate(x1,y1,x2,y2){return this.doors.get(this.dkey(x1,y1,x2,y2))||'open';}

  adjByDir(unit,dir){
    let nx=unit.x,ny=unit.y;
    if(dir==='up')ny--;if(dir==='down')ny++;if(dir==='left')nx--;if(dir==='right')nx++;
    if(nx<0||nx>3||ny<0||ny>3)return null;
    const key=this.dkey(unit.x,unit.y,nx,ny);
    const state=this.doors.get(key);
    if(state==null)return null;
    return{key,state,nx,ny,dir};
  }

  /* ── Actions ── */
  move(dir) {
    if(this.phase!=='play')return false;
    const unit=this.curUnit(); if(!unit||unit.moves<=0)return false;
    let nx=unit.x,ny=unit.y;
    if(dir==='up')ny--;if(dir==='down')ny++;if(dir==='left')nx--;if(dir==='right')nx++;
    if(nx<0||nx>3||ny<0||ny>3){return false;}
    const ds=this.dstate(unit.x,unit.y,nx,ny);
    if(ds!=='open'){return false;}
    this.pushUndo(unit);
    this.grid[unit.y][unit.x].units=this.grid[unit.y][unit.x].units.filter(u=>u!==unit);
    unit.x=nx;unit.y=ny;this.grid[ny][nx].units.push(unit);unit.moves--;
    this._actedId=unit.id;
    this.log(`${unit.id} → (${nx},${ny})`,'action');
    this.applyEffects(unit);
    this.afterAction(unit);
    return true;
  }

  applyEffects(unit) {
    const cell=this.grid[unit.y][unit.x]; if(!cell)return;
    if(cell.symbol==='XX'){unit.hp=Math.max(0,unit.hp-1);this.log(t(`${unit.id} hit 💥! HP: ${unit.hp}`,`${unit.id}触发💥！血量：${unit.hp}`),'danger');}
    if(cell.symbol==='☆'){
      if(unit.hasRevive){unit.hasRevive=false;unit.hp=Math.max(unit.hp,1);cell.symbol=null;this.log(t(`${unit.id} survived 💀 with 💚! HP=1`,`${unit.id}凭借💚存活💀！血量=1`),'event');}
      else{unit.hp=0;cell.symbol=null;this.log(t(`${unit.id} fell through 💀 — eliminated!`,`${unit.id}掉入💀——淘汰！`),'danger');return;}
    }
    if(cell.symbol==='△'){unit.hasRevive=true;cell.symbol=null;this.log(t(`${unit.id} grabbed 💚 (one revive).`,`${unit.id}获得💚（一次复活）。`),'event');}
    if(cell.symbol==='✦'){unit.moves++;cell.symbol=null;this.log(t(`${unit.id} grabbed ⚡ (+1 move).`,`${unit.id}获得⚡（+1移动）。`),'event');}
    if(cell.symbol==='+'){if(unit.type==='participant')this.stunHunter++;else this.stunPart++;cell.symbol=null;this.log(t(`${unit.id} triggered 💫 (stun).`,`${unit.id}触发💫（眩晕）。`),'danger');}
    if(cell.symbol==='■'){
      let fc=0;
      for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){const nx=unit.x+dx,ny=unit.y+dy;if(nx<0||nx>3||ny<0||ny>3)continue;const k=this.dkey(unit.x,unit.y,nx,ny);if(this.doors.has(k)){this.frozenDoors.add(k);fc++;}}
      this.log(t(`${unit.id} set off ❄️ — froze ${fc} door(s).`,`${unit.id}触发❄️——冻结了${fc}扇门。`),'danger');
    }
    if(cell.isExit&&unit.type==='participant'){unit.escaped=true;this.log(t(`${unit.id} ESCAPED!`,`${unit.id}逃脱了！`),'event');}
  }

  attack() {
    if(this.phase!=='play')return false;
    const unit=this.curUnit(); if(!unit||unit.attacks<=0)return false;
    if(unit.type==='hunter'&&this.currentTurn===0){this.log(t('Hunter cannot attack in Round 1.','第1轮猎手不能攻击。'),'danger');return false;}
    this.pushUndo(unit);
    const cell=this.grid[unit.y][unit.x]; let target=null;
    if(unit.type==='participant'){
      target=cell.units.find(u=>u.type==='hunter');
      if(target){target.hp=Math.max(0,target.hp-2);if(target.hp<=0&&target.hasRevive){target.hasRevive=false;target.hp=1;}this.log(t(`${unit.id} hits the hunter for 2. H HP: ${target.hp}`,`${unit.id}攻击猎手造成2伤害。猎手血量：${target.hp}`),'danger');}
    } else {
      const tgts=cell.units.filter(u=>u.type==='participant'&&u.hp>0);
      if(tgts.length){target=tgts[0];target.hp=Math.max(0,target.hp-3);if(target.hp<=0&&target.hasRevive){target.hasRevive=false;target.hp=1;}this.log(t(`Hunter hits ${target.id} for 3. ${target.id} HP: ${target.hp}`,`猎手攻击${target.id}造成3伤害。${target.id}血量：${target.hp}`),'danger');}
    }
    if(!target){if(isHumanUnit(unit))undoStack.pop();this.log(t('No target on this cell.','这一格没有目标。'));return false;}
    unit.attacks--;
    this._actedId=unit.id; this._hitId=target.id;
    this.afterAction(unit);
    return true;
  }

  _doorAction(dir,from,to,verb) {
    if(this.phase!=='play')return false;
    const unit=this.curUnit(); if(!unit||unit.moves<=0)return false;
    let door=dir?this.adjByDir(unit,dir):null;
    if(!door||door.state!==from){
      for(const d of['up','down','left','right']){const c=this.adjByDir(unit,d);if(c&&c.state===from){door=c;break;}}
    }
    if(!door||door.state!==from){return false;}
    if(this.frozenDoors.has(door.key)){this.log(t('That door is frozen!','那扇门被冻住了！'),'danger');return false;}
    this.pushUndo(unit);
    this.doors.set(door.key,to); unit.moves--;
    this._actedId=unit.id;
    this.log(t(`${unit.id} ${verb}s the ${tDir(door.dir)} door.`,`${unit.id}${tVerb(verb)}了${tDir(door.dir)}方向的门。`),'action');
    this.afterAction(unit);
    return true;
  }

  unlockDoor(dir){return this._doorAction(dir,'locked','closed','unlock');}
  openDoor  (dir){return this._doorAction(dir,'closed','open',  'open');}
  closeDoor (dir){return this._doorAction(dir,'open',  'closed','close');}
  lockDoor  (dir){return this._doorAction(dir,'closed','locked','lock');}

  checkWin() {
    const end=(w,msg)=>{
      this.gameOver=true;this.winner=w;this.log(msg,'event');
      stopScheduler();
      const nb=document.getElementById('newGameBtn');if(nb)nb.className='btn '+(w==='participants'?'new-game-glow':'new-game-glow-h');
      this.render();
    };
    if(this.participants.some(p=>p.escaped))      end('participants',t('🎉 RUNNERS WIN — escaped!','🎉 逃跑者获胜——逃脱！'));
    else if(this.hunter.hp<=0)                    end('participants',t('🎉 RUNNERS WIN — hunter down!','🎉 逃跑者获胜——猎手倒下！'));
    else if(this.participants.every(p=>p.hp<=0))  end('hunter',      t('💀 HUNTER WINS — all caught!','💀 猎手获胜——全员被抓！'));
    else {
      const alive=this.participants.filter(p=>p.hp>0&&!p.escaped);
      if(alive.length>0&&alive.every(p=>!this.participantCanAct(p))){
        const dk=(x1,y1,x2,y2)=>this.dkey(x1,y1,x2,y2);
        const reachable=alive.some(p=>findPath(this.hunter.x,this.hunter.y,p.x,p.y,this.doors,this.frozenDoors,dk)!==null);
        if(!reachable) end('hunter',t('💀 HUNTER WINS — runners sealed in!','💀 猎手获胜——逃跑者被冰封！'));
      }
    }
  }

  log(msg,type='') {
    const el=document.getElementById('gameLog');if(!el)return;
    const d=document.createElement('div');d.textContent=msg;
    if(type)d.className='log-'+type;
    el.appendChild(d);el.scrollTop=el.scrollHeight;
  }

  /* ── Render ── */
  render() {
    const board=document.getElementById('gameBoard');if(!board)return;
    board.innerHTML='';const cu=this.curUnit();
    const humanTurn = this.phase==='play' && !this.gameOver && cu && isHumanUnit(cu);
    for(let y=0;y<4;y++) for(let x=0;x<4;x++){
      const cd=this.grid[y][x];
      const cell=document.createElement('div');
      cell.className='cell'+(cd.isExit?' exit':'');
      const wall='2px solid #1e1e1e';
      const bFor=(tx,ty)=>{const k=this.dkey(x,y,tx,ty);return this.doors.has(k)?doorCSS(this.doors.get(k),this.frozenDoors.has(k)):wall;};
      cell.style.borderTop   =y===0?wall:bFor(x,y-1);
      cell.style.borderLeft  =x===0?wall:bFor(x-1,y);
      cell.style.borderRight =x===3?wall:'none';
      cell.style.borderBottom=y===3?wall:'none';

      if(this.phase==='setup'&&!((x===0&&y===0)||(x===3&&y===3))){cell.classList.add('placeable');cell.onclick=()=>this.placeToolAt(x,y);}

      // click-to-play affordances for the human's current unit
      if(humanTurn){
        const dx=x-cu.x, dy=y-cu.y, adj=(Math.abs(dx)+Math.abs(dy)===1);
        if(x===cu.x&&y===cu.y){
          const enemyHere=cd.units.some(u=>u.hp>0&&u.type!==cu.type);
          const canAtk=enemyHere&&cu.attacks>0&&!(cu.type==='hunter'&&this.currentTurn===0);
          if(canAtk){cell.classList.add('can-attack');cell.onclick=()=>this.attack();}
        } else if(adj&&cu.moves>0){
          const dir=dx===1?'right':dx===-1?'left':dy===1?'down':'up';
          const a=this.adjByDir(cu,dir);
          if(a&&!this.frozenDoors.has(a.key)){
            if(!this.sealMode){
              if(a.state==='open'){cell.classList.add('can-move');cell.onclick=()=>this.move(dir);const dot=document.createElement('div');dot.className='move-dot';cell.appendChild(dot);}
              else if(a.state==='closed'){cell.classList.add('can-open');cell.onclick=()=>this.openDoor(dir);}
              else if(a.state==='locked'){cell.classList.add('can-open');cell.onclick=()=>this.unlockDoor(dir);}
            } else {
              if(a.state==='open'){cell.classList.add('can-seal');cell.onclick=()=>this.closeDoor(dir);}
              else if(a.state==='closed'){cell.classList.add('can-seal');cell.onclick=()=>this.lockDoor(dir);}
            }
          }
        }
      }

      if(cd.isExit){const tag=document.createElement('div');tag.className='exit-tag';tag.textContent=t('EXIT','出口');cell.appendChild(tag);}
      if(cd.symbol){const ti=document.createElement('div');ti.className='trap-icon';ti.textContent=TRAP_EMOJI[cd.symbol]||cd.symbol;cell.appendChild(ti);}
      const coord=document.createElement('div');coord.className='cell-coord';coord.textContent=`${x},${y}`;cell.appendChild(coord);
      board.appendChild(cell);
    }
    this.renderUnits(cu);
    this.renderPanel();
  }

  // Persistent tokens in an overlay layer — they slide (CSS transform transition)
  // from cell to cell instead of snapping, so every move is easy to follow.
  renderUnits(cu){
    const board=document.getElementById('gameBoard'), layer=document.getElementById('unitLayer');
    if(!board||!layer)return;
    const cw=board.clientWidth/4, chH=board.clientHeight/4;
    if(!this.tokens)this.tokens={};
    // stacking offsets so units sharing a cell don't fully overlap
    const OFF=[[0,0],[-9,-8],[9,-8],[-9,9],[9,9]];
    const at={};
    const all=[...this.participants,this.hunter];
    for(const u of all){ const key=u.x+','+u.y; (at[key]=at[key]||[]).push(u); }
    for(const u of all){
      let tok=this.tokens[u.id];
      if(!tok){
        tok=document.createElement('div');
        tok.className='utoken '+u.type;
        tok.textContent=u.type==='hunter'?'H':u.id.replace('P','');
        const hp=document.createElement('div');hp.className='utoken-hp';tok.appendChild(hp);
        layer.appendChild(tok); this.tokens[u.id]=tok;
      }
      const dead=(u.hp<=0&&!u.escaped)||u.escaped;
      const stack=at[u.x+','+u.y], idx=Math.min(stack.indexOf(u),OFF.length-1), off=OFF[idx];
      tok.style.transform=`translate(${u.x*cw+cw/2+off[0]}px, ${u.y*chH+chH/2+off[1]}px)`;
      tok.classList.toggle('current', cu===u && !dead);
      tok.classList.toggle('gone', dead);
      tok.querySelector('.utoken-hp').textContent=Math.max(0,u.hp)+'♥';
    }
    // flash an attack's target (brightness only — tokens never resize)
    this._actedId=null;
    if(this._hitId){const tk=this.tokens[this._hitId];if(tk){tk.classList.remove('hit');void tk.offsetWidth;tk.classList.add('hit');setTimeout(()=>tk.classList.remove('hit'),460);}this._hitId=null;}
  }

  renderPanel() {
    const wb=document.getElementById('winBanner');
    if(wb){wb.className='win-banner';if(this.gameOver){wb.classList.add(this.winner==='participants'?'win-p':'win-h');wb.textContent=this.winner==='participants'?t('🎉 RUNNERS WIN','🎉 逃跑者获胜'):t('💀 HUNTER WINS','💀 猎手获胜');}}

    const tb=document.getElementById('turnBar');
    if(tb){
      const cu=this.curUnit();
      if(this.gameOver){tb.className='turn-bar';tb.innerHTML=t('Game Over','游戏结束');}
      else if(this.phase==='setup'){tb.className='turn-bar hunter-t';tb.innerHTML=t('Setup — place your traps','布置阶段——放置陷阱');}
      else if(!cu){tb.className='turn-bar';tb.textContent='...';}
      else{
        const human=isHumanUnit(cu);
        tb.className='turn-bar'+(cu.type==='hunter'?' hunter-t':'');
        const noAtk=cu.type==='hunter'&&this.currentTurn===0;
        const atkStr=noAtk?t('no atk','不可攻击'):cu.attacks>0?t('atk ✓','可攻击'):t('atk ✗','已攻击');
        const name=cu.type==='hunter'?t('Hunter','猎手'):cu.id;
        const who=human?t('YOUR TURN','你的回合'):t('AI','AI');
        tb.innerHTML=`<span>${name} · ${t('Rd','轮')} ${this.currentTurn+1} · ${cu.moves} ${t('mv','移')} · ${atkStr}</span><span class="who-tag">${who}</span>`;
      }
    }

    const uc=document.getElementById('unitCards');
    if(uc){
      uc.innerHTML='';const cu=this.curUnit();
      this.participants.forEach(p=>{
        const c=document.createElement('div');c.className='ucard'+(cu===p?' active':'');
        const mark=p.escaped?' ✓':p.hp<=0?' ✗':'';
        c.innerHTML=`<div class="uname">${p.id.replace('P','R')}${mark}</div><div class="hpbar"><div class="hpfill" style="width:${Math.max(0,p.hp/p.maxHp*100)}%"></div></div><div class="ustat">${Math.max(0,p.hp)}/${p.maxHp}${t('hp','血')}${p.hasRevive?' 💚':''}</div>`;
        uc.appendChild(c);
      });
      const hc=document.createElement('div');hc.className='ucard hunter-c'+(cu===this.hunter?' active':'');
      hc.innerHTML=`<div class="uname">${t('Hunter','猎手')}</div><div class="hpbar"><div class="hpfill" style="width:${Math.max(0,this.hunter.hp/this.hunter.maxHp*100)}%"></div></div><div class="ustat">${Math.max(0,this.hunter.hp)}/${this.hunter.maxHp}${t('hp','血')}</div>`;
      uc.appendChild(hc);
    }
    this.updateButtons();
  }

  updateButtons() {
    const u=this.curUnit(), over=this.gameOver;
    const human=u&&isHumanUnit(u)&&this.phase==='play'&&!over;
    const canAtk=human&&u.attacks>0&&!(u.type==='hunter'&&this.currentTurn===0)&&this.grid[u.y][u.x].units.some(x=>x.hp>0&&x.type!==u.type);
    const dis=(id,v)=>{const el=document.getElementById(id);if(el)el.disabled=v;};
    dis('attackBtn',!canAtk);
    dis('sealBtn',!human||u.moves<=0);
    dis('endTurnBtn',!human);
    dis('undoBtn',!undoStack.length||!(u&&isHumanUnit(u)));
    const sb=document.getElementById('sealBtn');
    if(sb)sb.classList.toggle('on',this.sealMode);
    const ph=document.getElementById('playHint');
    if(ph){
      if(this.gameOver) ph.textContent=t('Game over. Start a new game below.','游戏结束。下方开始新游戏。');
      else if(!human) ph.textContent=t('The AI is taking its turn…','AI 正在行动……');
      else ph.innerHTML=this.sealMode
        ? t('<b>Block mode:</b> click a glowing red door to shut / lock it (costs a move).','<b>封门模式：</b>点击发红的门以关闭/上锁（消耗一次移动）。')
        : t('Click a <b style="color:#1db954">green</b> cell to move, a <b style="color:#ffce4d">yellow</b> door to open it, or ⚔️ if the enemy shares your cell. ↶ Undo (Z) takes back your last action.','点击<b style="color:#1db954">绿色</b>格子移动，点<b style="color:#ffce4d">黄色</b>门开门，同格有敌人时可⚔️。↶ 撤销（Z）可收回上一步。');
    }
  }
}

/* ── Global wiring ─────────────────────────────────────── */
let game=null;
let humanSide='runners';   // 'runners' | 'hunter' | 'watch'
let aiTimer=null;
let undoStack=[];          // snapshots taken before each human action

function undoMove(){
  if(!game||game.phase!=='play'||!undoStack.length)return;
  const cu=game.curUnit();
  if(cu&&!isHumanUnit(cu))return;                 // AI already acting — too late
  game.restore(undoStack.pop());
  const nb=document.getElementById('newGameBtn');if(nb)nb.className='btn';
  document.getElementById('winBanner').className='win-banner';
  game.log(t('↶ undo','↶ 撤销'),'action');
  startScheduler();          // game-over stops the AI; revive it in case we rewound one
  game.render();
}

function isHumanUnit(u){
  if(!u)return false;
  return humanSide==='runners' ? u.type==='participant'
       : humanSide==='hunter'  ? u.type==='hunter'
       : false;
}

function openModeSelect(){
  stopScheduler();
  document.getElementById('modeOverlay').classList.add('show');
}

function chooseSide(side){
  humanSide=side;
  document.getElementById('modeOverlay').classList.remove('show');
  startGame();
}

function startGame(){
  stopScheduler();
  undoStack.length=0;
  document.getElementById('unitLayer').innerHTML='';   // drop tokens from the previous game
  document.getElementById('gameLog').innerHTML='';
  const nb=document.getElementById('newGameBtn');if(nb)nb.className='btn';
  game=new GameEngine(); game.init();
  if(humanSide==='hunter'){
    // human places traps
    document.getElementById('setupPanel').style.display='block';
    document.getElementById('controlPanel').style.display='none';
    game.log(t('Place your 6 traps, then start the hunt.','放置你的 6 个陷阱，然后开始追捕。'));
    game.refreshSetupUI();
  } else {
    document.getElementById('setupPanel').style.display='none';
    document.getElementById('controlPanel').style.display='block';
    game.aiPlaceTraps();
    game.finishSetup();  // → play + scheduler
  }
  applyLang();
}

function finishSetup(){ game?.finishSetup(); }

function endTurn() {
  if(!game)return;
  const u=game.curUnit();
  if(u&&isHumanUnit(u)){game.pushUndo(u);u.moves=0;u.attacks=0;game.nextTurn();}
}

/* ── AI scheduler: drives whichever side the human isn't playing ── */
function startScheduler(){ stopScheduler(); aiTimer=setInterval(aiTick, humanSide==='watch'?340:600); }
function stopScheduler(){ if(aiTimer){clearInterval(aiTimer);aiTimer=null;} }

function aiTick(){
  if(!game||game.gameOver||game.phase!=='play'){return;}
  const u=game.curUnit();
  if(!u){game.nextTurn();return;}
  if(isHumanUnit(u))return;          // wait for the human
  if(u.type==='participant') aiRunnerStep(u);
  else aiHunterStep(u);
}

function aiRunnerStep(u){
  const dk=game.dkey.bind(game);
  if(u.moves>0){
    const path=findPath(u.x,u.y,3,3,game.doors,game.frozenDoors,dk);
    if(path&&path.length){
      const next=path[0], dir=dirTo(u.x,u.y,next.x,next.y), a=game.adjByDir(u,dir);
      if(a){
        if(a.state==='open'){game.move(dir);return;}
        if(a.state==='closed'){game.openDoor(dir);return;}
        if(a.state==='locked'){game.unlockDoor(dir);return;}
      }
    }
  }
  if(u.attacks>0&&game.grid[u.y][u.x].units.some(x=>x.type==='hunter'&&game.hunter.hp>0)){game.attack();return;}
  u.moves=0;u.attacks=0;game.nextTurn();
}

function aiHunterStep(u){
  const dk=game.dkey.bind(game);
  const alive=game.participants.filter(p=>p.hp>0&&!p.escaped);
  if(!alive.length){u.moves=0;u.attacks=0;game.nextTurn();return;}
  if(u.attacks>0&&game.currentTurn>0&&alive.some(p=>p.x===u.x&&p.y===u.y)){game.attack();return;}
  if(u.moves>0){
    let bestPath=null,bestCost=Infinity;
    for(const p of alive){
      const path=findPath(u.x,u.y,p.x,p.y,game.doors,game.frozenDoors,dk);
      if(!path)continue;
      let c=0,cx=u.x,cy=u.y;
      for(const s of path){const k=dk(cx,cy,s.x,s.y);const st=game.doors.get(k);c+=st==='open'?1:st==='closed'?2:st==='locked'?3:999;cx=s.x;cy=s.y;}
      if(c<bestCost){bestCost=c;bestPath=path;}
    }
    if(bestPath&&bestPath.length){
      const next=bestPath[0],dir=dirTo(u.x,u.y,next.x,next.y),a=game.adjByDir(u,dir);
      if(a){
        if(a.state==='open'){game.move(dir);return;}
        if(a.state==='closed'){game.openDoor(dir);return;}
        if(a.state==='locked'){game.unlockDoor(dir);return;}
      }
    }
  }
  u.moves=0;u.attacks=0;game.nextTurn();
}

/* keyboard: arrows / WASD move the current human unit; space attacks; f toggles seal */
document.addEventListener('keydown',e=>{
  if(!game||game.phase!=='play'||game.gameOver)return;
  const cu=game.curUnit(); if(!cu||!isHumanUnit(cu))return;
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  if(e.key===' '){e.preventDefault();document.getElementById('attackBtn').disabled||game.attack();return;}
  if(e.key==='f'||e.key==='F'){e.preventDefault();if(cu.moves>0)game.toggleSeal();return;}
  if(e.key==='z'||e.key==='Z'){e.preventDefault();undoMove();return;}
  const dir=map[e.key]; if(!dir)return; e.preventDefault();
  if(cu.moves<=0)return;
  const aj=game.adjByDir(cu,dir); if(!aj||game.frozenDoors.has(aj.key))return;
  if(!game.sealMode){
    if(aj.state==='open')game.move(dir); else if(aj.state==='closed')game.openDoor(dir); else if(aj.state==='locked')game.unlockDoor(dir);
  } else {
    if(aj.state==='open')game.closeDoor(dir); else if(aj.state==='closed')game.lockDoor(dir);
  }
});

window.addEventListener('resize',()=>{ if(game)game.render(); });
document.addEventListener('DOMContentLoaded',()=>{applyLang();openModeSelect();});

/* remember the language across the whole arcade */
try { if (localStorage.getItem('arcade_lang') === 'zh') toggleLang(); } catch (e) {}
</script>
