<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gomoku // houfu.xyz</title>
  <link rel="icon" type="image/png" href="/game/stones.png?v=3">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Consolas, 'Courier New', monospace; background: #080808; color: #ccc; min-height: 100vh; padding: 20px 16px; }

    .pg-header { max-width: 920px; margin: 0 auto 18px; }
    .pg-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .pg-title { color: #1db954; font-size: 1.4rem; text-transform: uppercase; letter-spacing: -1px; }
    .pg-sub   { color: #666; font-size: 0.72rem; margin-top: 3px; line-height: 1.6; }
    .pg-back  { font-size: 0.72rem; color: #1db954; text-decoration: none; margin-top: 6px; display: inline-block; }
    .pg-back:hover { text-decoration: underline; }
    .lang-btn { background: transparent; border: 1px solid #1db954; color: #1db954; font-family: Consolas, monospace; font-size: 0.72rem; padding: 5px 11px; cursor: pointer; transition: background 0.1s; flex-shrink: 0; }
    .lang-btn:hover { background: rgba(29,185,84,0.1); }

    .layout { display: flex; gap: 20px; align-items: flex-start; max-width: 920px; margin: 0 auto; }
    .board-col { flex: 0 0 auto; }
    .panel-col { flex: 1; min-width: 0; }

    /* Canvas wrapper */
    #boardWrap { position: relative; display: inline-block; }
    #boardCanvas { display: block; cursor: crosshair; }
    #boardCanvas.thinking { cursor: wait; }

    /* Coord labels */
    .col-labels, .row-labels { position: absolute; font-size: 9px; color: #2a2a2a; user-select: none; pointer-events: none; }

    /* Panel */
    .pcard { background: #111; border: 1px solid #1c1c1c; padding: 11px 13px; margin-bottom: 8px; }
    .pcard-title { color: #1db954; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #1a1a1a; }

    /* Turn bar */
    .turn-bar { border: 1px solid #1db954; padding: 8px 12px; color: #1db954; font-size: 0.82rem; margin-bottom: 8px; }
    .turn-bar.red-t { border-color: #f44336; color: #f44336; }
    .turn-bar.done  { border-color: #555; color: #888; }

    /* Win banner */
    .win-banner { display: none; padding: 10px; text-align: center; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .win-banner.win-g { display: block; color: #1db954; border: 2px solid #1db954; }
    .win-banner.win-r { display: block; color: #f44336; border: 2px solid #f44336; }

    /* Score row */
    .score-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .sbox { flex: 1; border: 1px solid #1c1c1c; padding: 6px 9px; font-size: 0.68rem; }
    .sbox .slabel { color: #555; margin-bottom: 2px; }
    .sbox .sval   { font-size: 1rem; color: #ccc; }
    .sbox.green .sval { color: #1db954; }
    .sbox.red   .sval { color: #f44336; }

    /* Mode / difficulty toggles */
    .tog-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
    .tog { flex: 1; background: #0d0d0d; border: 1px solid #1e1e1e; color: #555; font-family: Consolas, monospace; font-size: 0.65rem; padding: 5px 6px; cursor: pointer; text-align: center; transition: all 0.1s; white-space: nowrap; }
    .tog:hover:not(:disabled) { border-color: #888; color: #aaa; }
    .tog.sel { border-color: #1db954; color: #1db954; background: rgba(29,185,84,0.06); }
    .tog.rl-slot { border-color: rgba(244,67,54,0.35); color: rgba(244,67,54,0.7); }
    .tog.rl-slot.locked { color: rgba(244,67,54,0.4); }
    .tog.rl-slot.sel { border-color: #f44336; color: #f44336; background: rgba(244,67,54,0.12); }
    #rlLoad input { width: 100%; background:#0a0a0a; border:1px solid #1e1e1e; color:#9ad6ad; font-family:Consolas,monospace; font-size:0.62rem; padding:5px 6px; margin-bottom:5px; }
    #rlLoad .rl-row { display:flex; gap:8px; align-items:center; }
    #rlLoad button { background:transparent; border:1px solid #f44336; color:#f44336; font-family:Consolas,monospace; font-size:0.62rem; padding:5px 10px; cursor:pointer; }
    #rlLoad button:hover { background:rgba(244,67,54,0.1); }
    #rlLoad a { font-size:0.62rem; color:#1db954; text-decoration:none; }
    #rlLoad a:hover { text-decoration:underline; }
    #rlMsg { font-size:0.6rem; color:#555; margin-top:5px; }

    /* Buttons */
    .brow { display: flex; gap: 5px; margin-top: 4px; }
    .btn { flex: 1; background: transparent; border: 1px solid #2a2a2a; color: #777; font-family: Consolas, monospace; font-size: 0.72rem; padding: 7px 8px; cursor: pointer; transition: all 0.1s; }
    .btn:hover:not(:disabled) { border-color: #1db954; color: #1db954; }
    .btn:disabled { opacity: 0.2; cursor: not-allowed; }
    @keyframes btn-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.3);}50%{box-shadow:0 0 0 5px rgba(255,255,255,0);} }
    .btn.glow-g { border-color: #1db954; color: #1db954; animation: btn-pulse 1.4s infinite; }
    .btn.glow-r { border-color: #f44336; color: #f44336; animation: btn-pulse 1.4s infinite; }

    /* Log */
    .log { max-height: 150px; overflow-y: auto; font-size: 0.67rem; line-height: 1.8; }
    .log div         { color: #555; }
    .log div.lmove   { color: #888; }
    .log div.lwin    { color: #1db954; }
    .log div.lwin-r  { color: #f44336; }
    .log div.lround  { color: #444; border-top: 1px solid #161616; margin-top: 2px; padding-top: 2px; }

    /* Thinking indicator */
    .thinking-dot::after { content: ''; animation: dots 1.2s infinite; }
    @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
    }

    /* Player type selector */
    .player-row { display: flex; gap: 10px; }
    .player-slot { flex: 1; }
    .slot-label { font-size: 0.68rem; margin-bottom: 5px; }
    .green-t { color: #1db954; }
    .red-t   { color: #f44336; }

    /* Remote play */
    .remote-row { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; }
    .join-input { flex: 1; background: #0d0d0d; border: 1px solid #1e1e1e; color: #ccc; font-family: Consolas, monospace; font-size: 0.68rem; padding: 6px 8px; min-width: 0; }
    .join-input:focus { outline: none; border-color: #1db954; }
    .room-code-display { font-size: 0.68rem; color: #555; white-space: nowrap; }
    .room-code { color: #1db954; margin-left: 4px; letter-spacing: 2px; }
    .conn-status { font-size: 0.65rem; color: #555; margin-top: 4px; min-height: 1em; }
    .conn-status.ok { color: #1db954; }
    .conn-status.err { color: #f44336; }

    /* Board overlay (waiting for remote opponent) */
    .board-overlay { position: absolute; inset: 0; background: rgba(8,8,8,0.82); display: none; align-items: center; justify-content: center; text-align: center; font-size: 0.75rem; color: #1db954; line-height: 1.8; padding: 20px; }

    /* remote tools: swap + emoji reactions */
    .emoji-bar { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .emoji-bar button { flex: 1 1 auto; min-width: 36px; background: #0d0d0d; border: 1px solid #1e1e1e; font-size: 1.1rem; padding: 5px 0; cursor: pointer; border-radius: 4px; transition: all 0.1s; }
    .emoji-bar button:hover { border-color: #1db954; background: rgba(29,185,84,0.08); }
    .react-float { position: fixed; left: 50%; top: 40%; transform: translate(-50%,-50%); font-size: 4rem; pointer-events: none; opacity: 0; z-index: 300; }
    .react-float.go { animation: reactPop 1.8s ease-out forwards; }
    @keyframes reactPop { 0%{opacity:0;transform:translate(-50%,-30%) scale(.4);} 16%{opacity:1;transform:translate(-50%,-50%) scale(1.15);} 70%{opacity:1;transform:translate(-50%,-60%) scale(1);} 100%{opacity:0;transform:translate(-50%,-140%) scale(1);} }
    .prompt-modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(4,6,4,0.72); z-index: 320; }
    .prompt-box { background: #0c0f0c; border: 1px solid #1db95466; border-radius: 6px; padding: 22px 26px; max-width: 320px; text-align: center; box-shadow: 0 0 50px -16px rgba(29,185,84,0.7); }
    .prompt-msg { color: #ddd; font-size: 0.86rem; margin-bottom: 16px; line-height: 1.55; }
    .prompt-btns { display: flex; gap: 10px; } .prompt-btns .btn { flex: 1; }

    /* prevent double-tap-to-zoom on fast taps — keeps scroll + pinch */
  html, body, button, a, input, select, label { touch-action: manipulation; }
</style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<div class="pg-header">
  <div class="pg-header-row">
    <div>
      <div class="pg-title" id="pgTitle">Gomoku</div>
      <div class="pg-sub" id="pgSub"></div>
      <a class="pg-back" id="pgBack" href="/">← arcade</a>
    </div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">中文</button>
  </div>
</div>

<div class="layout">
  <div class="board-col">
    <div id="boardWrap">
      <canvas id="boardCanvas"></canvas>
      <div id="boardOverlay" class="board-overlay" style="display:none">
        <span id="boardOverlayMsg"></span>
      </div>
    </div>
  </div>

  <div class="panel-col">
    <div id="winBanner" class="win-banner"></div>
    <div id="turnBar" class="turn-bar"></div>

    <div class="pcard">
      <div class="pcard-title" data-en="// score" data-zh="// 比分">// score</div>
      <div class="score-row">
        <div class="sbox green"><div class="slabel" id="p1label">●&nbsp;<span data-en="Lime" data-zh="青柠">Lime</span></div><div class="sval" id="s1">0</div></div>
        <div class="sbox red">  <div class="slabel" id="p2label">●&nbsp;<span data-en="Tomato" data-zh="番茄">Tomato</span></div><div class="sval" id="s2">0</div></div>
      </div>
    </div>

    <div class="pcard" id="playersCard">
      <div class="pcard-title" data-en="// players" data-zh="// 玩家设置">// players</div>
      <div class="player-row">
        <div class="player-slot">
          <div class="slot-label green-t">● <span data-en="Lime" data-zh="青柠">Lime</span></div>
          <div class="tog-row">
            <button class="tog sel ptype-1" data-val="human"  onclick="setPlayerType(1,'human')"  data-en="Human"  data-zh="人">Human</button>
            <button class="tog     ptype-1" data-val="ai"     onclick="setPlayerType(1,'ai')"     data-en="AI"     data-zh="AI">AI</button>
            <button class="tog     ptype-1" data-val="random" onclick="setPlayerType(1,'random')" data-en="Rand"   data-zh="随机">Rand</button>
          </div>
        </div>
        <div class="player-slot">
          <div class="slot-label red-t">● <span data-en="Tomato" data-zh="番茄">Tomato</span></div>
          <div class="tog-row">
            <button class="tog     ptype-2" data-val="human"  onclick="setPlayerType(2,'human')"  data-en="Human"  data-zh="人">Human</button>
            <button class="tog sel ptype-2" data-val="ai"     onclick="setPlayerType(2,'ai')"     data-en="AI"     data-zh="AI">AI</button>
            <button class="tog     ptype-2" data-val="random" onclick="setPlayerType(2,'random')" data-en="Rand"   data-zh="随机">Rand</button>
          </div>
        </div>
      </div>
    </div>

    <div class="pcard" id="diffCard">
      <div class="pcard-title" data-en="// ai difficulty" data-zh="// AI难度">// ai difficulty</div>
      <div class="tog-row" id="diffRow">
        <button class="tog"     data-diff="easy"   onclick="setDiff('easy')"   data-en="Casual"  data-zh="休闲">Casual</button>
        <button class="tog sel" data-diff="normal" onclick="setDiff('normal')" data-en="Normal"  data-zh="普通">Normal</button>
        <button class="tog"     data-diff="hard"   onclick="setDiff('hard')"   data-en="Hard"    data-zh="困难">Hard</button>
        <button class="tog rl-slot locked" id="btnRL" data-diff="rl" onclick="selectRL()" title="Your trained RL agent" data-en="RL ▷" data-zh="RL ▷">RL ▷</button>
      </div>
      <div style="margin-top:7px;text-align:right;">
        <a id="rlManage" href="javascript:void(0)" onclick="toggleRlLoad()" style="font-size:0.6rem;color:#777;text-decoration:none;" data-en="⚙ train / load RL agent" data-zh="⚙ 训练 / 加载 RL 智能体">⚙ train / load RL agent</a>
      </div>
      <div id="rlLoad" style="display:none;margin-top:8px;">
        <div id="rlStatus" style="font-size:0.62rem;color:#555;margin-bottom:5px;" data-en="Train your own agent, or paste a shared code:" data-zh="训练你自己的智能体，或粘贴分享码：">Train your own agent, or paste a shared code:</div>
        <input id="rlCode" placeholder="GRL1…" spellcheck="false">
        <div class="rl-row">
          <button onclick="loadRLCode()" data-en="Load code" data-zh="加载分享码">Load code</button>
          <a href="/game/gomoku_rl.html" data-en="⚙ train an agent →" data-zh="⚙ 训练智能体 →">⚙ train an agent →</a>
        </div>
        <div id="rlMsg"></div>
      </div>
    </div>

    <div class="pcard">
      <div class="pcard-title" data-en="// game" data-zh="// 游戏">// game</div>
      <div class="brow">
        <button class="btn" id="newBtn"    onclick="requestNewGame()" data-en="⟳ New Game" data-zh="⟳ 新游戏">⟳ New Game</button>
        <button class="btn" id="undoBtn"   onclick="undoMove()"       data-en="↩ Undo"     data-zh="↩ 悔棋"   disabled>↩ Undo</button>
        <button class="btn" id="resignBtn" onclick="resign()"       data-en="⚑ Resign"   data-zh="⚑ 认输">⚑ Resign</button>
        <button class="btn" id="pauseBtn"  onclick="togglePause()"  style="display:none" data-en="⏸ Pause" data-zh="⏸ 暂停">⏸ Pause</button>
      </div>
    </div>

    <div class="pcard">

      <div class="remote-row">
        <button class="btn" style="flex:0 0 auto" onclick="createRoom()" data-en="Create Room" data-zh="创建房间">Create Room</button>
        <span class="room-code-display"><span data-en="code:" data-zh="房间码:">code:</span><span id="roomCode" class="room-code">—</span></span>
      </div>
      <div class="remote-row">
        <input class="join-input" id="joinCode" placeholder="paste room code to join" maxlength="36">
        <button class="btn" style="flex:0 0 auto" onclick="joinRoom()" data-en="Join" data-zh="加入">Join</button>
      </div>
      <div id="connStatus" class="conn-status"></div>
    </div>

    <div class="pcard" id="remoteToolsCard" style="display:none">
      <div class="pcard-title" data-en="// remote tools" data-zh="// 联机工具">// remote tools</div>
      <button class="btn" id="swapBtn" onclick="requestSwap()" data-en="↔ Swap sides &amp; restart" data-zh="↔ 交换先后手并重开">↔ Swap sides &amp; restart</button>
      <div class="emoji-bar">
        <button onclick="sendReact('👍')" title="nice">👍</button>
        <button onclick="sendReact('😌')" title="chilling">😌</button>
        <button onclick="sendReact('🤔')" title="thinking">🤔</button>
        <button onclick="sendReact('😅')" title="phew">😅</button>
        <button onclick="sendReact('😠')" title="grr">😠</button>
        <button onclick="sendReact('🔥')" title="fire">🔥</button>
        <button onclick="sendReact('💣')" title="boom">💣</button>
        <button onclick="sendReact('🏳️')" title="i give up">🏳️</button>
      </div>
    </div>

    <div class="pcard">
      <div class="pcard-title" data-en="// log" data-zh="// 棋谱">// log</div>
      <div class="log" id="gameLog"></div>
    </div>
  </div>
</div>

<div id="reactFloat" class="react-float" aria-hidden="true"></div>
<div id="prompt" class="prompt-modal" style="display:none">
  <div class="prompt-box">
    <div id="promptMsg" class="prompt-msg"></div>
    <div class="prompt-btns">
      <button class="btn" id="promptYes" data-en="✓ Allow" data-zh="✓ 同意">✓ Allow</button>
      <button class="btn" id="promptNo" data-en="✗ Decline" data-zh="✗ 拒绝">✗ Decline</button>
    </div>
  </div>
</div>

<script>
/* ── i18n ─────────────────────────────────────── */
let lang = 'en';
function t(en, zh) { return lang === 'zh' ? zh : en; }

function applyLang() {
  document.getElementById('pgTitle').textContent = t('Gomoku', '五子棋');
  document.getElementById('pgSub').textContent   = t('5 in a row wins · 15×15 · click to place your stone', '五子连珠获胜 · 15×15棋盘 · 点击落子');
  document.getElementById('pgBack').textContent  = t('← arcade', '← 游戏厅');
  document.querySelectorAll('[data-en]').forEach(el => { el.textContent = t(el.dataset.en, el.dataset.zh); });
  updatePauseBtn();
  renderPanel();
}
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'zh' ? 'English' : '中文';
  applyLang();
  try { localStorage.setItem('arcade_lang', lang); } catch (e) {}
}

/* ── Constants ────────────────────────────────── */
const N    = 15;
const COLS = 'ABCDEFGHJKLMNOP'; // skip I (Go convention)
const STARS = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
// Search plies per difficulty. Strength now scales cleanly: easy(1) < normal(2)
// < hard(3), measured over randomised self-play. The reason "hard" used to feel
// EASIER than "normal" was never these numbers — it was (a) the old evaluation
// couldn't tell an open three from a dead one, so extra depth chased mirages, and
// (b) blocks weren't forced, so the deeper search would wander off defence. Both
// are fixed below (pattern-aware evaluate() + forced blocks in getCandidates).
// NB: depth 4 actually plays *worse* than 3 — an even depth ends the search on the
// opponent's reply, making the AI too passive in a game that rewards initiative.
const DEPTHS = { easy: 1, normal: 2, hard: 3 };
// Cap on quiet candidate moves explored per node, to keep search snappy.
// Forcing moves (wins/blocks) are never capped.
const MAX_CANDS = 12;

/* ── Canvas setup ─────────────────────────────── */
const canvas = document.getElementById('boardCanvas');
const ctx    = canvas.getContext('2d');
let PAD, CELL, CSIZE;

function computeLayout() {
  const maxW = Math.min(window.innerWidth - 40, 520);
  CELL  = Math.floor((maxW - 56) / (N - 1));
  PAD   = Math.floor(CELL * 0.8);
  CSIZE = CELL * (N - 1) + PAD * 2;
  canvas.width  = CSIZE;
  canvas.height = CSIZE;
}

/* ── Game state ───────────────────────────────── */
let board, curP, gameOver, winResult, lastMove, moveCount, aiThinking;
let aiTick = 0;   // bumped whenever the game state changes, to cancel a stale pending AI move
let history = [];
let scores = {1: 0, 2: 0};
let diff = 'normal';
let playerTypes = {1: 'human', 2: 'ai'};
let paused = false;
let remoteMode = false, myColor = null;

function newGame() {
  paused = false;
  board = Array.from({length: N}, () => new Array(N).fill(0));
  curP = 1; gameOver = false; winResult = null; lastMove = null; moveCount = 0; aiThinking = false;
  aiTick++;   // cancel any AI move still "thinking" from the previous game
  history = [];
  document.getElementById('undoBtn').disabled = true;
  document.getElementById('newBtn').className = 'btn';
  document.getElementById('winBanner').className = 'win-banner';
  updatePauseBtn();
  log(t('── new game ──', '── 新游戏 ──'), 'lround');
  draw();
  renderPanel();
  scheduleAI();
}

/* ── Player type ──────────────────────────────── */
function setPlayerType(p, t) {
  if (remoteMode) return;   // opponent is fixed while connected — no local player swaps
  playerTypes[p] = t;
  document.querySelectorAll(`.ptype-${p}`).forEach(b => b.classList.toggle('sel', b.dataset.val === t));
  document.getElementById('diffCard').style.display = (playerTypes[1] === 'ai' || playerTypes[2] === 'ai') ? '' : 'none';
  updatePauseBtn();
  newGame();
}
function setDiff(d) {
  if (remoteMode) return;   // no local AI difficulty while playing a person
  diff = d;
  document.querySelectorAll('[data-diff]').forEach(b => { if (b.dataset.diff) b.classList.toggle('sel', b.dataset.diff === d); });
  newGame();
}

/* ── Who is AI ────────────────────────────────── */
function isAI(player) {
  if (remoteMode) return false;
  const t = playerTypes[player];
  return t === 'ai' || t === 'random';
}

/* ── Pause (for AI vs AI / AI vs Rand) ───────── */
function updatePauseBtn() {
  const bothAuto = !remoteMode && playerTypes[1] !== 'human' && playerTypes[2] !== 'human';
  const btn = document.getElementById('pauseBtn');
  btn.style.display = bothAuto ? '' : 'none';
  btn.textContent = paused ? t('▶ Resume', '▶ 继续') : t('⏸ Pause', '⏸ 暂停');
}
function togglePause() {
  paused = !paused;
  updatePauseBtn();
  if (!paused) scheduleAI();
}

function scheduleAI() {
  if (gameOver || !isAI(curP) || aiThinking || paused) return;
  aiThinking = true;
  canvas.classList.add('thinking');
  renderPanel();
  const bothAuto = playerTypes[1] !== 'human' && playerTypes[2] !== 'human';
  const tick = ++aiTick;   // invalidate this pending move if the board/turn changes first
  setTimeout(() => {
    aiThinking = false;
    canvas.classList.remove('thinking');
    // Bail if anything changed while we were "thinking": new game, pause,
    // player-type/difficulty switch, remote takeover, or it's no longer an AI's turn.
    if (tick !== aiTick || gameOver || paused || remoteMode || !isAI(curP)) { renderPanel(); return; }
    const move = getAIMove();
    if (move) placeStone(move[0], move[1]);  // AI always local, never remote
  }, bothAuto ? 300 : 80);
}

/* ── Undo ─────────────────────────────────────── */
function undoMove() {
  if (remoteMode) {
    if (gameOver || _remoteMoves.length === 0) return;
    gameRef('req').set({ type: 'undo', by: myColor, status: 'pending' });
    setConnStatus(t('Undo requested — waiting for opponent…', '已请求悔棋 — 等待对方…'));
    return;
  }
  if (history.length === 0 || aiThinking) return;
  aiTick++;   // cancel any pending AI move so undo can't be immediately overwritten
  const apply = () => {
    const state = history.pop();
    board = state.board; curP = state.curP; lastMove = state.lastMove; moveCount = state.moveCount;
  };
  apply();
  // Playing against an AI, one undo lands on the AI's turn (which it would just
  // replay). Step back once more so control returns to the human.
  if (!gameOver && isAI(curP) && !(isAI(1) && isAI(2)) && history.length > 0) apply();
  gameOver  = false;
  winResult = null;
  document.getElementById('winBanner').className = 'win-banner';
  document.getElementById('newBtn').className = 'btn';
  document.getElementById('undoBtn').disabled = history.length === 0;
  log(t('↩ undo', '↩ 悔棋'), 'lround');
  draw();
  renderPanel();
  scheduleAI();   // resume AI-vs-AI if that's the mode
}

/* ── Place stone ──────────────────────────────── */
function placeStone(r, c) {
  if (gameOver || board[r][c] !== 0) return;
  if (!remoteMode) {
    history.push({ board: board.map(row => [...row]), curP, lastMove, moveCount });
    document.getElementById('undoBtn').disabled = false;
  }
  board[r][c] = curP;
  lastMove = [r, c];
  moveCount++;
  const col = COLS[c], row = N - r;
  log(`${moveCount}. ${t(curP===1?'Lime':'Tomato', curP===1?'青柠':'番茄')} ${col}${row}`, 'lmove');

  const wr = checkWin(board, r, c);
  if (wr) {
    winResult = wr;
    gameOver = true;
    scores[wr.player]++;
    const winner = wr.player === 1 ? t('Lime wins!', '青柠获胜！') : t('Tomato wins!', '番茄获胜！');
    log(winner, wr.player === 1 ? 'lwin' : 'lwin-r');
    const wb = document.getElementById('winBanner');
    wb.className = 'win-banner ' + (wr.player === 1 ? 'win-g' : 'win-r');
    wb.textContent = winner;
    document.getElementById('newBtn').className = 'btn ' + (wr.player === 1 ? 'glow-g' : 'glow-r');
    draw(); renderPanel(); return;
  }

  curP = curP === 1 ? 2 : 1;
  draw(); renderPanel();
  scheduleAI();
}

/* ── Canvas click ─────────────────────────────── */
canvas.addEventListener('click', e => {
  if (gameOver || aiThinking) return;
  if (document.getElementById('boardOverlay').style.display !== 'none') return;
  if (remoteMode && curP !== myColor) return;
  if (!remoteMode && isAI(curP)) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const c = Math.round((mx - PAD) / CELL);
  const r = Math.round((my - PAD) / CELL);
  if (r < 0 || r >= N || c < 0 || c >= N) return;
  if (Math.abs(mx - (PAD + c*CELL)) > CELL/2) return;
  if (Math.abs(my - (PAD + r*CELL)) > CELL/2) return;
  if (remoteMode) { fbSendMove(r, c); }  // Firebase echoes back → placeStone fires on both sides
  else { placeStone(r, c); }
});

/* ── Hover preview ────────────────────────────── */
let hoverCell = null;
canvas.addEventListener('mousemove', e => {
  if (gameOver || aiThinking || (remoteMode && curP !== myColor) || (!remoteMode && isAI(curP))) { hoverCell = null; return; }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const c = Math.round((mx - PAD) / CELL);
  const r = Math.round((my - PAD) / CELL);
  if (r < 0 || r >= N || c < 0 || c >= N || board[r][c] !== 0) { hoverCell = null; draw(); return; }
  if (!hoverCell || hoverCell[0] !== r || hoverCell[1] !== c) { hoverCell = [r, c]; draw(); }
});
canvas.addEventListener('mouseleave', () => { hoverCell = null; draw(); });

/* ── Draw ─────────────────────────────────────── */
function draw() {
  ctx.clearRect(0, 0, CSIZE, CSIZE);

  // Background
  ctx.fillStyle = '#0e0e0e';
  ctx.fillRect(0, 0, CSIZE, CSIZE);

  // Grid lines
  ctx.strokeStyle = '#242424';
  ctx.lineWidth = 1;
  for (let i = 0; i < N; i++) {
    const x = PAD + i * CELL, y = PAD + i * CELL;
    ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, PAD + (N-1)*CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(PAD + (N-1)*CELL, y); ctx.stroke();
  }

  // Star points
  ctx.fillStyle = '#2a2a2a';
  for (const [sr, sc] of STARS) {
    ctx.beginPath();
    ctx.arc(PAD + sc*CELL, PAD + sr*CELL, Math.max(2, CELL/14), 0, Math.PI*2);
    ctx.fill();
  }

  // Coord labels (very faint)
  ctx.fillStyle = '#252525';
  ctx.font = `${Math.max(8, CELL*0.28)}px Consolas, monospace`;
  ctx.textAlign = 'center';
  for (let i = 0; i < N; i++) {
    ctx.fillText(COLS[i], PAD + i*CELL, PAD - 6);
    ctx.fillText(String(N - i), PAD - 10, PAD + i*CELL + 3);
  }

  // Hover ghost
  if (hoverCell) {
    const [hr, hc] = hoverCell;
    ctx.globalAlpha = 0.35;
    drawStone(hr, hc, curP, false, false);
    ctx.globalAlpha = 1;
  }

  // Stones
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] !== 0) {
        const isWinStone = winResult?.line.some(([wr, wc]) => wr === r && wc === c);
        const isLast = lastMove && lastMove[0] === r && lastMove[1] === c;
        drawStone(r, c, board[r][c], isWinStone, isLast);
      }
    }
  }
}

function drawStone(r, c, player, isWin, isLast) {
  const x = PAD + c * CELL, y = PAD + r * CELL;
  const radius = CELL * 0.40;
  const color = player === 1 ? '#1db954' : '#f44336';

  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = isWin ? (player === 1 ? '#4eff8a' : '#ff6b5b') : color;

  if (isWin) {
    ctx.shadowColor = color; ctx.shadowBlur = 12;
  }
  ctx.fill();
  ctx.shadowBlur = 0;

  // Last move dot
  if (isLast && !isWin) {
    ctx.beginPath();
    ctx.arc(x, y, radius * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fill();
  }
}

/* ── Resign ───────────────────────────────────── */
function resignName(p) { return p === 1 ? t('Lime', '青柠') : t('Tomato', '番茄'); }
function showResign(loser) {

/* ═══════════════════════════════════════════════
   AI — Minimax with alpha-beta pruning
   ═══════════════════════════════════════════════ */

// Static evaluation, from black's (player 1) perspective: +ve favours black.
// The old version just counted stones per 5-window, which can't tell an *open*
// three (.XXX. — a live double threat) from a dead one (OXXX with a wall). With
// that blind spot, searching deeper than ~2 plies actually made the AI *worse*:
// it chased mirages the eval misjudged. Scoring runs by length AND open ends
// (below) gives the search a reliable signal, so deeper = genuinely stronger.
function evaluate(board) {
  return lineScore(board, 1) - lineScore(board, 2);
}

// Sum the threat value of every maximal run of `me`'s stones.
function lineScore(board, me) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  let score = 0;
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] !== me) continue;
      for (const [dr, dc] of dirs) {
        // Only score from a run's start (cell before us isn't the same colour).
        const pr = r - dr, pc = c - dc;
        if (pr >= 0 && pr < N && pc >= 0 && pc < N && board[pr][pc] === me) continue;
        let len = 1, er = r + dr, ec = c + dc;
        while (er >= 0 && er < N && ec >= 0 && ec < N && board[er][ec] === me) { len++; er += dr; ec += dc; }
        const openBefore = pr >= 0 && pr < N && pc >= 0 && pc < N && board[pr][pc] === 0;
        const openAfter  = er >= 0 && er < N && ec >= 0 && ec < N && board[er][ec] === 0;
        score += runScore(len, (openBefore ? 1 : 0) + (openAfter ? 1 : 0));
      }
    }
  }
  return score;
}

// Value of a run of `len` stones with `ends` open ends (0/1/2).
function runScore(len, ends) {
  if (len >= 5) return 1000000;        // five — game already won
  if (ends === 0) return 0;            // walled off both sides — dead
  if (len === 4) return ends === 2 ? 100000 : 12000;  // open four wins; closed four forces
  if (len === 3) return ends === 2 ? 5000  : 400;     // open three is a real double threat
  if (len === 2) return ends === 2 ? 250   : 30;
  return ends === 2 ? 20 : 5;
}

function checkWin(board, r, c) {
  const player = board[r][c];
  if (!player) return null;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    const line = [[r, c]];
    for (let d = 1; d < 5; d++) {
      const nr = r+d*dr, nc = c+d*dc;
      if (nr < 0 || nr >= N || nc < 0 || nc >= N || board[nr][nc] !== player) break;
      line.push([nr, nc]);
    }
    for (let d = 1; d < 5; d++) {
      const nr = r-d*dr, nc = c-d*dc;
      if (nr < 0 || nr >= N || nc < 0 || nc >= N || board[nr][nc] !== player) break;
      line.push([nr, nc]);
    }
    if (line.length >= 5) return { player, line };
  }
  return null;
}

// Fast win check (boolean) for AI search — avoids building line array
function isWinMove(board, r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let cnt = 1;
    for (let d = 1; d < 5; d++) { const nr=r+d*dr,nc=c+d*dc; if(nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==player)break; cnt++; }
    for (let d = 1; d < 5; d++) { const nr=r-d*dr,nc=c-d*dc; if(nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==player)break; cnt++; }
    if (cnt >= 5) return true;
  }
  return false;
}

function getCandidates(board, player) {
  const opp = player === 1 ? 2 : 1;
  const wins = [], blocks = [], others = [];
  const seen = new Set();
  let hasStone = false;

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] === 0) continue;
      hasStone = true;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r+dr, nc = c+dc;
          if (nr < 0 || nr >= N || nc < 0 || nc >= N || board[nr][nc] !== 0) continue;
          const key = nr*N+nc;
          if (seen.has(key)) continue;
          seen.add(key);

          board[nr][nc] = player;
          const pw = isWinMove(board, nr, nc, player);
          board[nr][nc] = 0;
          if (pw) { wins.push([nr, nc]); continue; }

          board[nr][nc] = opp;
          const ow = isWinMove(board, nr, nc, opp);
          board[nr][nc] = 0;
          if (ow) { blocks.push([nr, nc]); continue; }

          others.push([nr, nc]);
        }
      }
    }
  }
  if (!hasStone) return [[7, 7]];
  // 1. If we can win right now, only consider that.
  if (wins.length) return wins;
  // 2. If the opponent threatens to win next move, blocking is mandatory — never
  //    let the search wander off to its own attack and ignore an open four/five.
  //    This is the other half of the "hard felt easy" bug: blocks used to be
  //    merely ordered first, not forced, so a reckless search could skip them.
  if (blocks.length) return blocks;
  // 3. Quiet moves: rank by what the stone would build for us plus what it would
  //    deny the opponent. The old neighbour-count heuristic could prune the two
  //    end cells of an opponent's open three (they touch few stones) while keeping
  //    useless cluster cells — the AI literally couldn't see the only defence.
  //    Cells at open-three level or above are never capped away.
  const scored = others.map(([r, c]) => ({ r, c, s: localThreat(board, r, c, player) + localThreat(board, r, c, opp) * 1.1 }));
  scored.sort((a, b) => b.s - a.s);
  const keep = [];
  for (let i = 0; i < scored.length; i++) {
    if (i < MAX_CANDS || scored[i].s >= 5000) keep.push([scored[i].r, scored[i].c]);
  }
  return keep;
}

// Tactical value of placing `player`'s stone on the empty cell (r,c): the summed
// runScore of every line it would form through that cell (gap-fills included).
function localThreat(board, r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  board[r][c] = player;
  let s = 0;
  for (const [dr, dc] of dirs) {
    let len = 1;
    let er = r + dr, ec = c + dc;
    while (er >= 0 && er < N && ec >= 0 && ec < N && board[er][ec] === player) { len++; er += dr; ec += dc; }
    const openAfter = er >= 0 && er < N && ec >= 0 && ec < N && board[er][ec] === 0;
    let pr = r - dr, pc = c - dc;
    while (pr >= 0 && pr < N && pc >= 0 && pc < N && board[pr][pc] === player) { len++; pr -= dr; pc -= dc; }
    const openBefore = pr >= 0 && pr < N && pc >= 0 && pc < N && board[pr][pc] === 0;
    s += runScore(len, (openBefore ? 1 : 0) + (openAfter ? 1 : 0));
  }
  board[r][c] = 0;
  return s;
}

function minimax(board, depth, alpha, beta, isMax, lr, lc) {
  if (lr !== null && isWinMove(board, lr, lc, board[lr][lc])) {
    return board[lr][lc] === 1 ? 500000 + depth : -(500000 + depth);
  }
  if (depth === 0) return evaluate(board);

  const player = isMax ? 1 : 2;
  const cands = getCandidates(board, player);

  if (isMax) {
    let best = -Infinity;
    for (const [r, c] of cands) {
      board[r][c] = 1;
      const s = minimax(board, depth-1, alpha, beta, false, r, c);
      board[r][c] = 0;
      if (s > best) best = s;
      if (best > alpha) alpha = best;
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const [r, c] of cands) {
      board[r][c] = 2;
      const s = minimax(board, depth-1, alpha, beta, true, r, c);
      board[r][c] = 0;
      if (s < best) best = s;
      if (best < beta) beta = best;
      if (beta <= alpha) break;
    }
    return best;
  }
}

/* ── RL agent (trained in gomoku_rl.html) ─────────
   Plays by 1-ply selection on a learned linear value over the same pattern
   features the trainer used. getCandidates() already forces wins/blocks, so the
   learned agent gets a safety net against outright blunders. ─────────────────── */
let rlWeights = null;            // { w:[12], scale }
const RL_SCALE = 0.25;
function rlLineFeatures(b){
  const f={1:{o2:0,c2:0,o3:0,c3:0,f4:0,of4:0},2:{o2:0,c2:0,o3:0,c3:0,f4:0,of4:0}};
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){const p=b[r][c];if(!p)continue;
    for(const[dr,dc]of dirs){const pr=r-dr,pc=c-dc;
      if(pr>=0&&pr<N&&pc>=0&&pc<N&&b[pr][pc]===p)continue;
      let len=1,er=r+dr,ec=c+dc;
      while(er>=0&&er<N&&ec>=0&&ec<N&&b[er][ec]===p){len++;er+=dr;ec+=dc;}
      const ob=(pr>=0&&pr<N&&pc>=0&&pc<N&&b[pr][pc]===0);
      const oa=(er>=0&&er<N&&ec>=0&&ec<N&&b[er][ec]===0);
      const ends=(ob?1:0)+(oa?1:0),o=f[p];
      if(len>=5)o.of4++;else if(ends===0){}else if(len===4)ends===2?o.of4++:o.f4++;
      else if(len===3)ends===2?o.o3++:o.c3++;else if(len===2)ends===2?o.o2++:o.c2++;}}
  return f;
}
function rlValue(b){
  const f=rlLineFeatures(b),a=f[1],z=f[2],s=rlWeights.scale||RL_SCALE,w=rlWeights.w;
  const x=[a.o2,a.c2,a.o3,a.c3,a.f4,a.of4,z.o2,z.c2,z.o3,z.c3,z.f4,z.of4];
  let v=0; for(let i=0;i<12;i++) v+=w[i]*x[i]*s; return v;
}
function rlMove(b, player){
  const cands=getCandidates(b, player);
  if(!cands.length) return null;
  if(cands.length===1) return cands[0];
  const max = player===1;            // value is player-1-absolute
  let best = max?-Infinity:Infinity, bm=cands[0];
  for(const [r,c] of cands){ b[r][c]=player; const v=rlValue(b); b[r][c]=0; if(max?v>best:v<best){best=v;bm=[r,c];} }
  return bm;
}
function rlDecode(code){
  if(!code || code.slice(0,4)!=='GRL1') return null;
  try{ const o=JSON.parse(atob(code.slice(4))); if(Array.isArray(o.w)&&o.w.length===12) return {w:o.w, scale:o.s||RL_SCALE}; }catch(e){}
  return null;
}
function rlInit(){
  try{ const raw=localStorage.getItem('gomoku_rl_agent'); if(raw){ const o=JSON.parse(raw);
    if(o&&Array.isArray(o.w)&&o.w.length===12) rlWeights={w:o.w, scale:o.scale||o.s||RL_SCALE}; } }catch(e){}
  const btn=document.getElementById('btnRL');
  if(rlWeights && btn){ btn.classList.remove('locked'); btn.title='Your trained RL agent (loaded ✓)'; }
  updateRlStatus();
}
function updateRlStatus(){
  const mng=document.getElementById('rlManage'), st=document.getElementById('rlStatus');
  if(rlWeights){
    if(mng){ mng.dataset.en='⚙ swap / retrain agent'; mng.dataset.zh='⚙ 更换 / 重新训练'; mng.textContent=t('⚙ swap / retrain agent','⚙ 更换 / 重新训练'); }
    if(st){ st.dataset.en='Agent loaded ✓ — retrain a new one, or paste a friend’s code:'; st.dataset.zh='已加载智能体 ✓ — 重新训练，或粘贴好友的分享码：'; st.textContent=t(st.dataset.en,st.dataset.zh); }
  }
}
function toggleRlLoad(){ const el=document.getElementById('rlLoad'); el.style.display = (!el.style.display || el.style.display==='none') ? '' : 'none'; }
function selectRL(){
  if(rlWeights){ document.getElementById('rlLoad').style.display='none'; setDiff('rl'); }
  else { toggleRlLoad(); }
}
function loadRLCode(){
  const w=rlDecode(document.getElementById('rlCode').value.trim());
  const msg=document.getElementById('rlMsg');
  if(!w){ msg.style.color='#f44336'; msg.textContent=t('Invalid code — copy it from the trainer.','无效分享码——请从训练页复制。'); return; }
  rlWeights=w;
  try{ localStorage.setItem('gomoku_rl_agent', JSON.stringify({v:1,type:'gomoku-rl',scale:w.scale,w:w.w})); }catch(e){}

}

function getAIMove() {
  if (playerTypes[curP] === 'random') {
    // genuinely random: any empty cell touching a stone — no forced wins/blocks
    // (getCandidates would sneak tactics in, which made "Rand" weirdly sharp)
    const opts = [], seen = new Set();
    let hasStone = false;
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      if (board[r][c] === 0) continue;
      hasStone = true;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= N || nc < 0 || nc >= N || board[nr][nc] !== 0) continue;
        const k = nr * N + nc;
        if (!seen.has(k)) { seen.add(k); opts.push([nr, nc]); }
      }
    }
    if (!hasStone) return [7, 7];
    return opts.length ? opts[(Math.random() * opts.length) | 0] : null;
  }
  if (diff === 'rl' && rlWeights) return rlMove(board, curP);
  return getBestMove();
}

function getBestMove() {
  const player = curP;
  const isMax  = player === 1;
  const depth  = DEPTHS[diff];
  const cands  = getCandidates(board, player);
  if (!cands.length) return null;
  if (cands.length === 1) return cands[0];

  let bestScore = isMax ? -Infinity : Infinity;
  let bestMove  = cands[0];

  for (const [r, c] of cands) {
    board[r][c] = player;
    let score;
    if (isWinMove(board, r, c, player)) {
      score = isMax ? 1000000 : -1000000;
    } else {
      score = minimax(board, depth - 1, -Infinity, Infinity, !isMax, r, c);
    }
    board[r][c] = 0;

    if (isMax ? score > bestScore : score < bestScore) {
      bestScore = score;
      bestMove  = [r, c];
    }
    // Stop early only on a forced WIN for us. Breaking on a forced loss too was a
    // real bug: the search would give up after the first candidate and play an
    // arbitrary neighbour cell instead of the most resistant defence.
    if ((isMax ? bestScore : -bestScore) >= 500000) break;
  }
  return bestMove;
}

function applyState(moves) {
  _remoteMoves = moves.slice();

  curP = 1; moveCount = 0; lastMove = null; gameOver = false; winResult = null; hoverCell = null;
  let winner = null;
  for (const m of moves) {
    const r = m[0], c = m[1];
    if (r == null || c == null || board[r][c] !== 0) continue;
    board[r][c] = curP; lastMove = [r, c]; moveCount++;
    const wr = checkWin(board, r, c);

function onReq(snap) {
  const req = snap.val();

  showPrompt(msg, () => approveReq(req), () => { gameRef('req').set({ type: req.type, by: req.by, status: 'declined' }); hidePrompt(); });

function approveReq(req) {
  hidePrompt();
  if (req.type === 'undo') {
    // rewind to before the requester's own last move: 1 ply if they moved last,
    // 2 plies if the opponent has already replied (the usual case)
    const L = _remoteMoves.length;
    if (L) {
      const lastMover = (L - 1) % 2 === 0 ? 1 : 2;
      const cut = (lastMover === req.by || L < 2) ? 1 : 2;
      gameRef('play').set({ s: _fbSession, moves: _remoteMoves.slice(0, L - cut) });

  }
  else if (req.type === 'swap') { gameRef('over').remove(); gameRef('host').set(3 - _curHost); gameRef('play').set({ s: _fbSession + 1 }); }
  gameRef('req').remove();
}
